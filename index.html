<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FLH">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>FLH Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090909;
  --s1: #111111;
  --s2: #181818;
  --s3: #222222;
  --border: #2a2a2a;
  --acc: #F59E0B;
  --acc2: #FCD34D;
  --green: #10B981;
  --red: #EF4444;
  --blue: #60A5FA;
  --t1: #F0F0F0;
  --t2: #888;
  --t3: #444;
  --mono: 'DM Mono', monospace;
  --sans: 'Sora', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#topbar {
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
#topbar .title { font-size: 13px; font-family: var(--mono); color: var(--t2); letter-spacing: 0.1em; text-transform: uppercase; }
#topbar .right { display: flex; gap: 8px; }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 0 16px; }
#bottomnav {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 8px; background: none; border: none; cursor: pointer;
  color: var(--t3); font-family: var(--sans); font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase; transition: color .15s;
}
.nav-btn.active { color: var(--acc); }
.nav-btn .ico { font-size: 20px; }
.icon-btn {
  background: var(--s2); border: 1px solid var(--border); border-radius: 8px;
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--t2);
}

/* SCREENS */
.screen { display: none; padding: 20px; }
.screen.active { display: block; }

/* CARDS */
.card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 14px;
  padding: 18px 20px; margin-bottom: 12px;
}
.card-label { font-size: 10px; font-family: var(--mono); color: var(--t3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.card-value { font-size: 28px; font-weight: 700; font-family: var(--mono); color: var(--t1); letter-spacing: -0.5px; }
.card-sub { font-size: 12px; color: var(--t2); margin-top: 4px; }

/* STATUS BADGE */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  font-family: var(--mono);
}
.status-badge.at-work { background: rgba(16,185,129,.15); color: var(--green); border: 1px solid rgba(16,185,129,.3); }
.status-badge.not-work { background: rgba(255,255,255,.04); color: var(--t3); border: 1px solid var(--border); }
.status-badge.unknown { background: rgba(96,165,250,.1); color: var(--blue); border: 1px solid rgba(96,165,250,.3); }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* SHIFT CARD */
.shift-card {
  background: linear-gradient(135deg, #141414 0%, #0f0f0f 100%);
  border: 1px solid var(--border); border-left: 3px solid var(--acc);
  border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;
}
.shift-title { font-size: 13px; font-weight: 600; color: var(--acc); margin-bottom: 10px; font-family: var(--mono); }
.shift-times { display: flex; align-items: center; gap: 10px; }
.shift-time { font-size: 26px; font-weight: 700; font-family: var(--mono); }
.shift-arrow { color: var(--t3); font-size: 14px; }
.shift-delta { font-size: 11px; color: var(--t2); margin-top: 6px; font-family: var(--mono); }

/* ARRIVAL CARD */
.arrival-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 20px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.arrival-info .label { font-size: 10px; font-family: var(--mono); color: var(--t3); text-transform: uppercase; letter-spacing: .1em; }
.arrival-info .time { font-size: 20px; font-family: var(--mono); font-weight: 500; color: var(--t1); margin-top: 2px; }

/* MAIN BUTTON */
.btn-main {
  width: 100%; padding: 16px; border-radius: 14px; border: none; cursor: pointer;
  font-family: var(--sans); font-size: 16px; font-weight: 700; letter-spacing: -0.2px;
  transition: all .15s; position: relative; overflow: hidden;
}
.btn-main:active { transform: scale(.97); }
.btn-main.arrival { background: var(--acc); color: #000; }
.btn-main.departure { background: var(--s2); color: var(--t1); border: 1px solid var(--border); }
.btn-main.disabled { background: var(--s2); color: var(--t3); border: 1px solid var(--border); pointer-events: none; }
.btn-secondary {
  width: 100%; padding: 13px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--s2); color: var(--t2); cursor: pointer; font-family: var(--sans);
  font-size: 14px; font-weight: 600; margin-top: 8px; transition: all .15s;
}
.btn-secondary:active { background: var(--s3); }
.btn-small {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--s2); color: var(--t2); cursor: pointer; font-family: var(--mono);
  font-size: 11px; font-weight: 500;
}

/* PROGRESS RING */
.progress-wrap { display: flex; flex-direction: column; align-items: center; padding: 24px 20px 8px; }
.ring-container { position: relative; width: 180px; height: 180px; }
.ring-container svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--s3); stroke-width: 14; }
.ring-fill { fill: none; stroke: var(--acc); stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1); }
.ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.ring-value { font-size: 28px; font-weight: 700; font-family: var(--mono); color: var(--t1); letter-spacing: -1px; }
.ring-label { font-size: 10px; color: var(--t3); font-family: var(--mono); text-transform: uppercase; margin-top: 2px; }
.ring-limit { font-size: 12px; color: var(--t2); margin-top: 12px; font-family: var(--mono); }

/* LOG LIST */
.log-list { margin-top: 4px; }
.log-item {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; margin-bottom: 8px; display: grid;
  grid-template-columns: 1fr auto; gap: 4px 12px; align-items: center;
}
.log-date { font-size: 11px; font-family: var(--mono); color: var(--t3); }
.log-turno { font-size: 13px; font-weight: 600; color: var(--t1); }
.log-details { font-size: 11px; color: var(--t2); font-family: var(--mono); }
.log-flh { font-size: 18px; font-weight: 700; font-family: var(--mono); color: var(--acc); text-align: right; }
.log-flh.zero { color: var(--t3); font-size: 14px; }

/* ARCHIVIO */
.archive-item {
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
}
.archive-mese { font-size: 14px; font-weight: 600; }
.archive-tot { font-size: 20px; font-family: var(--mono); font-weight: 700; color: var(--acc); }
.archive-giorni { font-size: 11px; color: var(--t3); font-family: var(--mono); margin-top: 2px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
  z-index: 100; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--s1); border: 1px solid var(--border); border-radius: 24px 24px 0 0;
  padding: 24px 20px calc(var(--safe-bottom) + 24px); width: 100%;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--s3); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

/* MENSA TOGGLE */
.mensa-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
.mensa-btn {
  flex: 1; padding: 14px; border-radius: 12px; border: 2px solid var(--border);
  background: var(--s2); color: var(--t2); cursor: pointer; font-family: var(--sans);
  font-size: 15px; font-weight: 600; text-align: center; transition: all .15s;
}
.mensa-btn.selected { border-color: var(--acc); color: var(--acc); background: rgba(245,158,11,.08); }

/* FLH PREVIEW in modal */
.flh-preview {
  background: var(--s2); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; margin-bottom: 20px;
}
.flh-preview-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
.flh-preview-row:last-child { border-bottom: none; padding-top: 10px; }
.flh-preview-label { font-size: 12px; color: var(--t2); font-family: var(--mono); }
.flh-preview-val { font-size: 13px; font-family: var(--mono); font-weight: 500; color: var(--t1); }
.flh-preview-total { font-size: 22px; font-family: var(--mono); font-weight: 700; color: var(--acc); }

/* SETUP */
.setup-group { margin-bottom: 20px; }
.setup-label { font-size: 11px; font-family: var(--mono); color: var(--t3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.setup-input {
  width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--s2); color: var(--t1); font-family: var(--mono); font-size: 14px;
  outline: none;
}
.setup-input:focus { border-color: var(--acc); }
.setup-hint { font-size: 11px; color: var(--t3); margin-top: 5px; line-height: 1.4; }

/* ALERT BANNER */
.alert-banner {
  background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 12px;
  font-size: 12px; color: var(--acc2); line-height: 1.5;
}
.alert-banner.error { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: #FCA5A5; }
.alert-banner.success { background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.3); color: #6EE7B7; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.section-title { font-size: 11px; font-family: var(--mono); color: var(--t3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px 20px; color: var(--t3); font-size: 13px; }
.empty .ico { font-size: 36px; margin-bottom: 12px; }

/* SPINNER */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--s3);
  border-top-color: var(--acc); border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* EXPORT */
.export-btn {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--s2); color: var(--t1); cursor: pointer; font-family: var(--sans);
  font-size: 14px; font-weight: 600; margin-bottom: 10px; transition: background .15s;
}
.export-btn:active { background: var(--s3); }
.export-btn .ico { font-size: 20px; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.screen.active { animation: fadeIn .2s ease; }
</style>
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="title" id="topbar-title">FLH TRACKER</div>
    <div class="right">
      <div class="icon-btn" id="refresh-btn" title="Aggiorna">🔄</div>
      <div class="icon-btn" id="settings-btn" title="Impostazioni">⚙️</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- SCREEN: OGGI -->
    <div class="screen active" id="screen-oggi">
      <div id="oggi-content">
        <!-- dynamic content -->
      </div>
    </div>

    <!-- SCREEN: MESE -->
    <div class="screen" id="screen-mese">
      <div id="mese-content"></div>
    </div>

    <!-- SCREEN: STORICO -->
    <div class="screen" id="screen-storico">
      <div id="storico-content"></div>
    </div>

    <!-- SCREEN: SETUP -->
    <div class="screen" id="screen-setup">
      <div id="setup-content"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottomnav">
    <button class="nav-btn active" data-screen="oggi">
      <span class="ico">🕐</span>Oggi
    </button>
    <button class="nav-btn" data-screen="mese">
      <span class="ico">📊</span>Mese
    </button>
    <button class="nav-btn" data-screen="storico">
      <span class="ico">📁</span>Storico
    </button>
  </nav>
</div>

<!-- MODAL: REGISTRA USCITA -->
<div class="modal-overlay" id="modal-uscita">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Registra Uscita</div>
    <div id="modal-uscita-content"></div>
  </div>
</div>

<!-- MODAL: MODIFICA GIORNO -->
<div class="modal-overlay" id="modal-modifica">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Modifica giorno</div>
    <div id="modal-modifica-content"></div>
  </div>
</div>
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✅ FLH Registrato</div>
    <div id="modal-risultato-content"></div>
  </div>
</div>

<script>
const APP_VERSION = '2.0';

// ─────────────────────────────────────────────
// STORAGE
// ─────────────────────────────────────────────
const S = {
  get: k => { try { return JSON.parse(localStorage.getItem('flh_' + k)); } catch { return null; } },
  set: (k, v) => localStorage.setItem('flh_' + k, JSON.stringify(v)),
  del: k => localStorage.removeItem('flh_' + k),
};

// ─────────────────────────────────────────────
// GITHUB API — salvataggio persistente
// ─────────────────────────────────────────────
const GH = {
  // File salvati nel repo: dati_flh.json (unico file con tutto)
  FILE: 'dati_flh.json',

  headers(token) {
    return {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
    };
  },

  async getFile(token, owner, repo) {
    try {
      const r = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/contents/${this.FILE}`,
        { headers: this.headers(token), cache: 'no-store' }
      );
      if (r.status === 404) return { content: null, sha: null };
      if (!r.ok) return null;
      const d = await r.json();
      const content = JSON.parse(atob(d.content.replace(/\n/g, '')));
      return { content, sha: d.sha };
    } catch { return null; }
  },

  async saveFile(token, owner, repo, data, sha) {
    try {
      const body = {
        message: 'FLH update ' + new Date().toISOString().slice(0,10),
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
      };
      if (sha) body.sha = sha;
      const r = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/contents/${this.FILE}`,
        { method: 'PUT', headers: this.headers(token), body: JSON.stringify(body) }
      );
      if (!r.ok) { const e = await r.json(); throw new Error(e.message); }
      const d = await r.json();
      return d.content.sha;
    } catch(e) { console.error('GH save error:', e); return null; }
  },
};

// Carica dati da GitHub e aggiorna localStorage
async function ghLoad() {
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) return false;
  const result = await GH.getFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo);
  if (!result || !result.content) return false;
  const d = result.content;
  S.set('gh_sha', result.sha);
  if (d.mese_attivo) S.set('mese_attivo', d.mese_attivo);
  if (d.mese_corrente !== undefined) S.set('mese_corrente', d.mese_corrente);
  if (d.log_corrente) S.set('log_corrente', d.log_corrente);
  if (d.archivio) S.set('archivio', d.archivio);
  return true;
}

// Salva tutti i dati su GitHub
async function ghSave() {
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) return false;
  const data = {
    mese_attivo: S.get('mese_attivo'),
    mese_corrente: S.get('mese_corrente') || 0,
    log_corrente: S.get('log_corrente') || [],
    archivio: S.get('archivio') || [],
    aggiornato: new Date().toISOString(),
  };
  const sha = S.get('gh_sha');
  const newSha = await GH.saveFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, data, sha);
  if (newSha) { S.set('gh_sha', newSha); return true; }
  return false;
}

const defaultConfig = {
  apiKey: '',
  calendarId: '',
  workLat: 41.9248,
  workLng: 12.4598,
  workRadius: 150,
  ghToken: '',
  ghOwner: '',
  ghRepo: '',
};

function getConfig() {
  // Prima legge dal localStorage, poi sovrascrive con params dall'URL hash se presenti
  const base = Object.assign({}, defaultConfig, S.get('config') || {});
  try {
    const hash = window.location.hash.slice(1);
    if (hash) {
      const params = new URLSearchParams(hash);
      if (params.get('k')) base.apiKey = params.get('k');
      if (params.get('c')) base.calendarId = params.get('c');
      if (params.get('r')) base.workRadius = parseInt(params.get('r'));
      if (params.get('lat')) base.workLat = parseFloat(params.get('lat'));
      if (params.get('lng')) base.workLng = parseFloat(params.get('lng'));
      if (params.get('gt')) base.ghToken = params.get('gt');
      if (params.get('go')) base.ghOwner = params.get('go');
      if (params.get('gr')) base.ghRepo = params.get('gr');
      // Salva in localStorage così è disponibile subito
      S.set('config', base);
    }
  } catch(e) {}
  return base;
}

function getMeseKey(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function controllaCambioMese() {
  const meseAttivo = S.get('mese_attivo');
  const meseOggi = getMeseKey();
  if (meseAttivo && meseAttivo !== meseOggi) {
    const totMin = S.get('mese_corrente') || 0;
    const log = S.get('log_corrente') || [];
    const archivio = S.get('archivio') || [];
    archivio.unshift({ mese: meseAttivo, totMin, totFmt: minToHM(totMin), giorni: log });
    S.set('archivio', archivio);
    S.set('mese_corrente', 0);
    S.set('log_corrente', []);
    S.del('arrivo');
    S.set('mese_attivo', meseOggi);
    ghSave(); // Fix BUG 4: sincronizza archivio su GitHub
  } else {
    S.set('mese_attivo', meseOggi);
  }
}

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function minToHM(min) {
  min = Math.max(0, Math.round(min));
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h + 'h ' + String(m).padStart(2, '0') + 'm';
}

function fmtTime(d) {
  if (!d) return '--:--';
  d = new Date(d);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function fmtDate(d) {
  d = new Date(d);
  const giorni = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
  const mesi = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];
  return giorni[d.getDay()] + ' ' + d.getDate() + ' ' + mesi[d.getMonth()];
}

function nomeMese(key) {
  const [y, m] = key.split('-');
  const nomi = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno',
                'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
  return nomi[parseInt(m) - 1] + ' ' + y;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dl = (lat2 - lat1) * Math.PI / 180;
  const do_ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dl/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(do_/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function isArrivoValido(isoStr) {
  if (!isoStr) return false;
  const d = new Date(isoStr);
  const now = new Date();
  // Accetta arrivi nelle ultime 30 ore (copre turni notturni)
  return (now - d) < 30 * 60 * 60 * 1000;
}

function isToday(isoStr) {
  if (!isoStr) return false;
  const d = new Date(isoStr);
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

// ─────────────────────────────────────────────
// FLH CALCULATION
// ─────────────────────────────────────────────
function calcolaFLH(arrivo, uscita, turnoInizio, turnoFine) {
  const a = new Date(arrivo), u = new Date(uscita);
  const ti = new Date(turnoInizio), tf = new Date(turnoFine);

  // FLH testa: arrivato DOPO l'inizio turno
  let testa = a > ti ? Math.round((a - ti) / 60000) : 0;
  // FLH coda: uscito PRIMA della fine turno
  let coda  = u < tf ? Math.round((tf - u) / 60000) : 0;
  // Straordinario: uscito DOPO la fine turno
  const straordinario = u > tf ? Math.round((u - tf) / 60000) : 0;

  // Applica soglia 15 min sui valori lordi (prima della compensazione)
  // Se il valore lordo è < 15min, non conta — azzeralo prima di compensare
  if (testa < 15) testa = 0;
  if (coda < 15) coda = 0;

  // Lo straordinario compensa il FLH testa (non può andare sotto zero)
  testa = Math.max(0, testa - straordinario);

  let tot = testa + coda;
  if (tot > 120) { // max 2h
    const r = 120 / (testa + coda || 1);
    testa = Math.round(testa * r);
    coda = 120 - testa;
    tot = 120;
  }

  return { testa, coda, straordinario, tot, fmt: minToHM(tot) };
}

// ─────────────────────────────────────────────
// GEOLOCATION
// ─────────────────────────────────────────────
let geoStatus = 'unknown'; // unknown | at_work | away
let lastPos = null;

function checkGeo() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { geoStatus = 'unavailable'; resolve(geoStatus); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      lastPos = pos;
      const cfg = getConfig();
      const dist = haversine(pos.coords.latitude, pos.coords.longitude, cfg.workLat, cfg.workLng);
      geoStatus = dist <= cfg.workRadius ? 'at_work' : 'away';
      resolve(geoStatus);
    }, () => {
      geoStatus = 'unknown';
      resolve(geoStatus);
    }, { timeout: 8000, maximumAge: 60000 });
  });
}

// ─────────────────────────────────────────────
// GOOGLE CALENDAR
// ─────────────────────────────────────────────
let todayShift = null;
let calendarError = null;

async function fetchShift() {
  const cfg = getConfig();
  calendarError = null;
  if (!cfg.apiKey || !cfg.calendarId) { calendarError = 'setup'; return null; }
  try {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const todayStr = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
    const yest = new Date(now); yest.setDate(yest.getDate()-1);
    const yesterdayStr = yest.getFullYear() + '-' + pad(yest.getMonth()+1) + '-' + pad(yest.getDate());

    const tMin = new Date(yest.getFullYear(), yest.getMonth(), yest.getDate(), 0, 0, 0).toISOString();
    const tMax = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();

    const calId = encodeURIComponent(cfg.calendarId);
    const url = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events?timeMin=${tMin}&timeMax=${tMax}&key=${cfg.apiKey}&singleEvents=true&orderBy=startTime`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.error) { calendarError = data.error.message; return null; }

    const allEvents = (data.items || []).filter(e => e.start && e.start.dateTime);
    const logCorrente = S.get('log_corrente') || [];

    // Helper: questo turno è già nel log? (controlla turnoInizio nelle ultime 48h)
    const giaLoggato = startDate => {
      const ini = pad(startDate.getHours()) + ':' + pad(startDate.getMinutes());
      return logCorrente.some(r => {
        if (r.turnoInizio !== ini) return false;
        return (now - new Date(r.data)) < 48 * 60 * 60 * 1000;
      });
    };

    // ── CASO 1: turno di ieri ancora IN CORSO adesso ──
    const inCorso = allEvents.find(e => {
      if (e.start.dateTime.slice(0,10) !== yesterdayStr) return false;
      const end = new Date(e.end.dateTime);
      return now <= end;
    });
    if (inCorso) {
      todayShift = { titolo: inCorso.summary || 'Turno', inizio: new Date(inCorso.start.dateTime), fine: new Date(inCorso.end.dateTime) };
      return todayShift;
    }

    // ── CASO 2: turno notturno di ieri, finito OGGI dopo mezzanotte,
    //            uscita non ancora registrata ──
    const notturnoFinito = allEvents.find(e => {
      if (e.start.dateTime.slice(0,10) !== yesterdayStr) return false;
      const end = new Date(e.end.dateTime);
      const endStr = end.getFullYear() + '-' + pad(end.getMonth()+1) + '-' + pad(end.getDate());
      if (endStr !== todayStr) return false; // finisce ieri → non è notturno
      if (now <= end) return false;          // ancora in corso → già caso 1
      return !giaLoggato(new Date(e.start.dateTime));
    });
    if (notturnoFinito) {
      todayShift = { titolo: notturnoFinito.summary || 'Turno', inizio: new Date(notturnoFinito.start.dateTime), fine: new Date(notturnoFinito.end.dateTime) };
      return todayShift;
    }

    // ── CASO 3: turno che INIZIA oggi, non ancora loggato ──
    const turniOggi = allEvents.filter(e => {
      const start = new Date(e.start.dateTime);
      const localDate = start.getFullYear() + '-' + pad(start.getMonth()+1) + '-' + pad(start.getDate());
      return localDate === todayStr && !giaLoggato(start);
    });
    if (!turniOggi.length) { calendarError = 'Nessun turno oggi nel calendario "Turni"'; return null; }
    const ev = turniOggi[0];
    todayShift = { titolo: ev.summary || 'Turno', inizio: new Date(ev.start.dateTime), fine: new Date(ev.end.dateTime) };
    return todayShift;

  } catch(e) {
    calendarError = 'Errore di rete — riprova';
    return null;
  }
}

async function renderOggi(refresh) {
  const el = document.getElementById('oggi-content');
  if (refresh || !todayShift) {
    el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:20px 0;color:var(--t3)"><div class="spinner"></div> Caricamento...</div>';
    await Promise.all([checkGeo(), fetchShift()]);
  }

  controllaCambioMese();
  const arrivoSalvato = S.get('arrivo');
  const arrivoOggi = arrivoSalvato && isArrivoValido(arrivoSalvato) ? arrivoSalvato : null;

  // Controlla mancata uscita: arrivo salvato di più di 16 ore fa senza uscita registrata
  const logCorrente = S.get('log_corrente') || [];
  let mancataUscita = false;
  if (arrivoSalvato && !isArrivoValido(arrivoSalvato)) {
    // Arrivo vecchio (>30h) senza uscita corrispondente nel log
    const arrivoD = new Date(arrivoSalvato);
    const pad = n => String(n).padStart(2,'0');
    const arrivoData = arrivoD.getFullYear() + '-' + pad(arrivoD.getMonth()+1) + '-' + pad(arrivoD.getDate());
    const giaUscito = logCorrente.some(r => {
      const rD = new Date(r.data);
      const rData = rD.getFullYear() + '-' + pad(rD.getMonth()+1) + '-' + pad(rD.getDate());
      return rData === arrivoData;
    });
    if (!giaUscito) {
      mancataUscita = true;
      // Pulisce l'arrivo orfano
      S.del('arrivo');
    }
  }

  let html = '';

  // Status badge
  const badges = {
    at_work: '<span class="status-badge at-work"><span class="badge-dot"></span>Sei al lavoro</span>',
    away: '<span class="status-badge not-work"><span class="badge-dot"></span>Non sei al lavoro</span>',
    unknown: '<span class="status-badge unknown"><span class="badge-dot"></span>Posizione non rilevata</span>',
    unavailable: '<span class="status-badge not-work"><span class="badge-dot"></span>GPS non disponibile</span>',
  };
  html += `<div style="margin-bottom:14px">${badges[geoStatus] || badges.unknown}</div>`;
  html += `<div style="font-size:12px;color:var(--t3);font-family:var(--mono);margin-bottom:16px">${fmtDate(new Date())} · ${new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'})}</div>`;

  // Alert mancata uscita
  if (mancataUscita) {
    html += `<div class="alert-banner warn" style="border-left-color:var(--yellow);margin-bottom:12px">
      ⚠️ <strong>Mancata uscita rilevata</strong><br>
      Hai un arrivo registrato senza uscita corrispondente. Vuoi registrarla ora?
      <br><button class="btn-small" style="margin-top:8px" onclick="apriModalUscitaManuale()">Registra uscita mancante</button>
    </div>`;
  }

  // Setup warning
  const cfg = getConfig();
  if (!cfg.apiKey || !cfg.calendarId) {
    html += '<div class="alert-banner">⚙️ <strong>Configurazione richiesta</strong><br>Tocca ⚙️ in alto per inserire API Key e Calendar ID del tuo Google Calendar.</div>';
  }

  // Shift card
  if (todayShift) {
    const durata = Math.round((todayShift.fine - todayShift.inizio) / 60000);
    const durataH = Math.floor(durata / 60);
    const durataM = durata % 60;
    html += `<div class="shift-card">
      <div class="shift-title">${todayShift.titolo}</div>
      <div class="shift-times">
        <span class="shift-time">${fmtTime(todayShift.inizio)}</span>
        <span class="shift-arrow">→</span>
        <span class="shift-time">${fmtTime(todayShift.fine)}</span>
      </div>
      <div class="shift-delta">Durata prevista: ${durataH > 0 ? durataH + 'h ' : ''}${durataM}m</div>
    </div>`;
  } else if (calendarError && calendarError !== 'setup') {
    html += `<div class="alert-banner error">📅 ${calendarError}</div>`;
  } else if (!cfg.apiKey) {
    html += `<div class="card" style="border-style:dashed">
      <div class="card-label">Turno di oggi</div>
      <div style="color:var(--t3);font-size:13px;margin-top:4px">Configura il calendario per vedere i turni automaticamente</div>
    </div>`;
  }

  // Arrival
  if (arrivoOggi) {
    html += `<div class="arrival-card">
      <div class="arrival-info">
        <div class="label">Arrivo registrato</div>
        <div class="time">⏰ ${fmtTime(arrivoOggi)}</div>
      </div>
      <button class="btn-small" onclick="modificaArrivo()">Modifica</button>
    </div>`;
  }

  // Main action button
  if (!arrivoOggi) {
    html += `<button class="btn-main arrival" onclick="registraArrivo()">
      📍 Registra Arrivo
    </button>`;
  } else {
    html += `<button class="btn-main departure" onclick="apriModalUscita()">
      🚪 Registra Uscita e Calcola FLH
    </button>`;
  }

  // FLH già registrato oggi: cerca per turno corrente se disponibile, altrimenti per data
  const logOggi = todayShift
    ? (S.get('log_corrente') || []).find(r => r.turnoInizio === fmtTime(todayShift.inizio))
    : (S.get('log_corrente') || []).find(r => isToday(r.data));
  if (logOggi) {
    html += `<div class="divider"></div>
    <div class="alert-banner success">✅ FLH registrato: <strong>${logOggi.flhFmt}</strong> · Mese: <strong>${minToHM(S.get('mese_corrente') || 0)}</strong></div>`;
  }

  el.innerHTML = html;
}

function registraArrivo() {
  const ora = new Date().toISOString();
  S.set('arrivo', ora);
  renderOggi(false);
}

function modificaArrivo() {
  const arrivoAttuale = S.get('arrivo');
  const oraStr = prompt('Ora di arrivo (formato HH:MM):', fmtTime(arrivoAttuale || new Date()));
  if (!oraStr) return;
  const [h, m] = oraStr.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) { alert('Formato non valido'); return; }
  // Fix BUG 7: usa la data dell'arrivo salvato come base, non new Date()
  const base = arrivoAttuale ? new Date(arrivoAttuale) : new Date();
  base.setHours(h, m, 0, 0);
  S.set('arrivo', base.toISOString());
  renderOggi(false);
}

let mensaScelto = null;
let uscitaOverrideGlobal = null; // Fix BUG 1+2: mantiene uscitaOverride tra renderModalUscita e confermaUscita

function apriModalUscitaManuale() {
  const arrivoSalvato = S.get('arrivo');
  const arrivoStr = prompt('Che ora sei arrivato? (HH:MM)', arrivoSalvato ? fmtTime(arrivoSalvato) : '');
  if (!arrivoStr) return;
  const [ah, am] = arrivoStr.split(':').map(Number);
  if (isNaN(ah) || isNaN(am)) { alert('Formato non valido'); return; }

  const uscitaStr = prompt('Che ora sei uscito? (HH:MM)', '');
  if (!uscitaStr) return;
  const [uh, um] = uscitaStr.split(':').map(Number);
  if (isNaN(uh) || isNaN(um)) { alert('Formato non valido'); return; }

  // Base data: usa la data dell'arrivo salvato se esiste, altrimenti ieri
  const baseData = arrivoSalvato ? new Date(arrivoSalvato) : (() => { const d = new Date(); d.setDate(d.getDate()-1); return d; })();

  const arrivoD = new Date(baseData);
  arrivoD.setHours(ah, am, 0, 0);

  const uscitaD = new Date(baseData);
  uscitaD.setHours(uh, um, 0, 0);
  // Se uscita <= arrivo, è il giorno dopo (turno notturno)
  if (uscitaD <= arrivoD) uscitaD.setDate(uscitaD.getDate() + 1);

  S.set('arrivo', arrivoD.toISOString());
  apriModalUscita(uscitaD);
}

function apriModalUscita(uscitaOverride) {

    if (flhInfo.coda > 0) html += `<div class="flh-preview-row"><span class="flh-preview-label">Anticipo uscita</span><span class="flh-preview-val" style="color:var(--acc)">${flhInfo.coda}'</span></div>`;

  </div>`;

  } else {

function scegliMensa(v) {
  mensaScelto = v;
  renderModalUscita(uscitaOverrideGlobal); // Fix BUG 2
}

function confermaUscita() {
  const arrivoISO = S.get('arrivo');
  const uscitaOra = uscitaOverrideGlobal || new Date(); // Fix BUG 1

  let flhResult = { testa: 0, coda: 0, straordinario: 0, tot: 0, fmt: '0h 00m' };
  if (todayShift && arrivoISO) {
    flhResult = calcolaFLH(arrivoISO, uscitaOra, todayShift.inizio, todayShift.fine);
  }

  // Salva nel log — usa la data di uscita come chiave giornaliera
  const riga = {
    data: uscitaOra.toISOString(),
    dateFmt: fmtDate(new Date(arrivoISO || uscitaOra)), // Fix BUG 6: mostra la data del turno (arrivo)
    turno: todayShift ? todayShift.titolo : '—',
    turnoInizio: todayShift ? fmtTime(todayShift.inizio) : '—',
    turnoFine: todayShift ? fmtTime(todayShift.fine) : '—',
    arrivo: fmtTime(arrivoISO),
    uscita: fmtTime(uscitaOra),
    mensa: mensaScelto,
    flhTesta: flhResult.testa,
    flhCoda: flhResult.coda,
    flhStraordinario: flhResult.straordinario || 0,
    flhTot: flhResult.tot,
    flhFmt: flhResult.fmt,
  };

  const log = S.get('log_corrente') || [];
  // Evita duplicati: rimuovi eventuale registrazione con stessa ora di inizio turno
  const filtered = log.filter(r => r.turnoInizio !== riga.turnoInizio);
  filtered.push(riga);
  S.set('log_corrente', filtered);

  // Aggiorna totale mese
  const vecchioTot = S.get('mese_corrente') || 0;
  const vecchioConTurno = log.find(r => r.turnoInizio === riga.turnoInizio);
  const base = vecchioConTurno ? vecchioTot - vecchioConTurno.flhTot : vecchioTot;
  S.set('mese_corrente', Math.max(0, base + flhResult.tot));

  // Reset
  S.del('arrivo');
  uscitaOverrideGlobal = null;

  chiudiModal('modal-uscita');
  mostraRisultato(riga);

  ghSave().then(ok => {
    if (!ok) console.warn('Salvataggio GitHub non riuscito — dati solo in locale');
  });
}

  html += '</div>';

  html += `<button class="btn-main arrival" onclick="chiudiModal('modal-risultato');todayShift=null;renderOggi(true)">OK</button>`;
  document.getElementById('modal-risultato-content').innerHTML = html;
  document.getElementById('modal-risultato').classList.add('open');

function renderMese() {
  const totMin = S.get('mese_corrente') || 0;
  const log = S.get('log_corrente') || [];
  const meseKey = getMeseKey();
  const pct = Math.min(1, totMin / 600);
  const R = 80, C = 90;
  const circ = 2 * Math.PI * R;
  const offset = circ * (1 - pct);

  let html = `<div class="progress-wrap">
    <div class="ring-container">
      <svg width="${C*2}" height="${C*2}" viewBox="0 0 ${C*2} ${C*2}">
        <circle class="ring-track" cx="${C}" cy="${C}" r="${R}" />
        <circle class="ring-fill" cx="${C}" cy="${C}" r="${R}"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" />
      </svg>
      <div class="ring-center">
        <div class="ring-value">${minToHM(totMin)}</div>
        <div class="ring-label">${nomeMese(meseKey)}</div>
      </div>
    </div>
    <div class="ring-limit">di 10h 00m disponibili · residuo <strong style="color:var(--green)">${minToHM(Math.max(0, 600 - totMin))}</strong></div>
  </div><div style="padding:0 20px">`;

  // Export
  html += `<button class="export-btn" onclick="esportaMese()">
    <span class="ico">📤</span>
    <div>
      <div>Esporta mese corrente (.txt)</div>
      <div style="font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:2px">→ File · Personale · Desktop · FLH</div>
    </div>
  </button>`;

  html += '<div class="divider"></div>';
  html += `<div class="section-title">Giorni registrati (${log.length})</div>`;
  html += '<div class="log-list">';

  if (!log.length) {
    html += '<div class="empty"><div class="ico">📋</div>Nessun giorno registrato questo mese</div>';
  } else {
    [...log].reverse().forEach((r, i) => {
      const idx = log.length - 1 - i; // indice reale nel log non invertito
      html += `<div class="log-item">
        <div style="min-width:0">
          <div class="log-date">${r.dateFmt}</div>
          <div class="log-turno">${r.turno}</div>
          <div class="log-details">${r.turnoInizio}→${r.turnoFine} · presenza ${r.arrivo}→${r.uscita} · mensa ${r.mensa==='si'?'✓':'✗'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
          <div class="${r.flhTot > 0 ? 'log-flh' : 'log-flh zero'}">${r.flhFmt}</div>
          <button class="btn-small" onclick="apriModificaGiorno(${idx})">✏️</button>
        </div>
      </div>`;
    });
  }

  html += '</div></div>';
  document.getElementById('mese-content').innerHTML = html;
}

function esportaMese() {
  const log = S.get('log_corrente') || [];
  const totMin = S.get('mese_corrente') || 0;
  const meseKey = getMeseKey();
  let txt = `=== ${nomeMese(meseKey)} | Totale: ${totMin} min (${minToHM(totMin)}) | Residuo: ${minToHM(Math.max(0, 600 - totMin))} ===\n`;
  txt += 'DATA|TURNO|T_INI|T_FIN|ARRIVO|USCITA|MENSA|TESTA|CODA|TOT_MIN|FLH\n';
  log.forEach(r => {
    txt += `${r.dateFmt}|${r.turno}|${r.turnoInizio}|${r.turnoFine}|${r.arrivo}|${r.uscita}|${r.mensa}|${r.flhTesta}|${r.flhCoda}|${r.flhTot}|${r.flhFmt}\n`;
  });
  const blob = new Blob([txt], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `FLH_${meseKey}.txt`;
  a.click(); URL.revokeObjectURL(url);
  setTimeout(() => alert('📂 File scaricato!\n\nSalvalo in:\nFile → Personale → Desktop → FLH\n(OneDrive personale)'), 400);
}

function mostraDettaglioMese(meseKey) {
  const archivio = S.get('archivio') || [];
  const mese = archivio.find(a => a.mese === meseKey);
  if (!mese) return;
  let txt = `${nomeMese(meseKey)}: ${mese.totFmt}\n\n`;
  mese.giorni.forEach(r => {
    txt += `${r.dateFmt} — ${r.turno} — ${r.arrivo}→${r.uscita} — FLH: ${r.flhFmt}\n`;
  });
  alert(txt);
}

function esportaStorico() {
  const archivio = S.get('archivio') || [];
  const log = S.get('log_corrente') || [];
  const meseKey = getMeseKey();
  const totMin = S.get('mese_corrente') || 0;
  let txt = '';

  // Mese corrente
  txt += `=== ${nomeMese(meseKey)} | ${totMin} min (${minToHM(totMin)}) ===\n`;
  log.forEach(r => { txt += `${r.dateFmt}|${r.turno}|${r.arrivo}→${r.uscita}|${r.flhFmt}\n`; });

  // Archivio
  archivio.forEach(a => {
    txt += `\n=== ${nomeMese(a.mese)} | ${a.totMin} min (${a.totFmt}) ===\n`;
    a.giorni.forEach(r => { txt += `${r.dateFmt}|${r.turno}|${r.arrivo}→${r.uscita}|${r.flhFmt}\n`; });
  });

  const blob = new Blob([txt], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'FLH_Storico.txt';
  a.click(); URL.revokeObjectURL(url);
  setTimeout(() => alert('📂 File scaricato!\n\nSalvalo in:\nFile → Personale → Desktop → FLH\n(OneDrive personale)'), 400);
}

    </button>`;

function salvaModificaGiorno() {
  const log = S.get('log_corrente') || [];
  const r = log[editIdx];
  if (!r) return;

  const nuovoArrivo = document.getElementById('edit-arrivo').value;
  const nuovaUscita = document.getElementById('edit-uscita').value;
  const nuovaMensa = document.getElementById('edit-mensa-si').classList.contains('selected') ? 'si' : 'no';

  if (!nuovoArrivo || !nuovaUscita) { alert('Inserisci orari validi'); return; }

  // Ricostruisce le date usando la data originale del giorno
  const baseData = new Date(r.data);
  const [ah, am] = nuovoArrivo.split(':').map(Number);
  const [uh, um] = nuovaUscita.split(':').map(Number);

  const arrivoD = new Date(baseData); arrivoD.setHours(ah, am, 0, 0);
  const uscitaD = new Date(baseData); uscitaD.setHours(uh, um, 0, 0);
  if (uscitaD <= arrivoD) uscitaD.setDate(uscitaD.getDate() + 1);

  // Ricalcola FLH
  const [tiH, tiM] = r.turnoInizio.split(':').map(Number);
  const [tfH, tfM] = r.turnoFine.split(':').map(Number);
  const turnoIni = new Date(baseData); turnoIni.setHours(tiH, tiM, 0, 0);
  const turnoFin = new Date(baseData); turnoFin.setHours(tfH, tfM, 0, 0);
  if (turnoFin <= turnoIni) turnoFin.setDate(turnoFin.getDate() + 1);

  const flh = calcolaFLH(arrivoD, uscitaD, turnoIni, turnoFin);

  // Aggiorna la riga
  const vecchioFlh = r.flhTot;
  log[editIdx] = {
    ...r,
    arrivo: fmtTime(arrivoD),
    uscita: fmtTime(uscitaD),
    mensa: nuovaMensa,
    flhTesta: flh.testa,
    flhCoda: flh.coda,
    flhStraordinario: flh.straordinario || 0,
    flhTot: flh.tot,
    flhFmt: flh.fmt,
  };
  S.set('log_corrente', log);

  // Aggiorna totale mese
  const tot = (S.get('mese_corrente') || 0) - vecchioFlh + flh.tot;
  S.set('mese_corrente', Math.max(0, tot));

  chiudiModal('modal-modifica');
  ghSave();
  renderMese();
  alert(`✅ Giorno modificato\nFLH: ${flh.fmt}`);
}

function eliminaGiorno(idx) {
  if (!confirm('Eliminare questo giorno dal log?')) return;
  const log = S.get('log_corrente') || [];
  const vecchioFlh = log[idx] ? log[idx].flhTot : 0;
  log.splice(idx, 1);
  S.set('log_corrente', log);
  const tot = Math.max(0, (S.get('mese_corrente') || 0) - vecchioFlh);
  S.set('mese_corrente', tot);
  chiudiModal('modal-modifica');
  ghSave();
  renderMese();
}

function salvaConfig() {
  const prev = getConfig();
  const cfg = {
    apiKey: (document.getElementById('cfg-apikey') || {}).value?.trim() || prev.apiKey,
    calendarId: (document.getElementById('cfg-calid') || {}).value?.trim() || prev.calendarId,
    workRadius: parseInt((document.getElementById('cfg-radius') || {}).value) || 150,
    workLat: parseFloat((document.getElementById('cfg-lat') || {}).value) || 41.9248,
    workLng: parseFloat((document.getElementById('cfg-lng') || {}).value) || 12.4598,
    ghToken: (document.getElementById('cfg-ghtoken') || {}).value?.trim() || prev.ghToken,
    ghOwner: (document.getElementById('cfg-ghowner') || {}).value?.trim() || prev.ghOwner,
    ghRepo: (document.getElementById('cfg-ghrepo') || {}).value?.trim() || prev.ghRepo,
  };
  S.set('config', cfg);

  // Aggiorna l'URL hash con la configurazione
  const params = new URLSearchParams();
  if (cfg.apiKey) params.set('k', cfg.apiKey);
  if (cfg.calendarId) params.set('c', cfg.calendarId);
  if (cfg.workRadius !== 150) params.set('r', cfg.workRadius);
  if (cfg.workLat !== 41.9248) params.set('lat', cfg.workLat);
  if (cfg.workLng !== 12.4598) params.set('lng', cfg.workLng);
  if (cfg.ghToken) params.set('gt', cfg.ghToken);
  if (cfg.ghOwner) params.set('go', cfg.ghOwner);
  if (cfg.ghRepo) params.set('gr', cfg.ghRepo);
  const newUrl = window.location.pathname + (params.toString() ? '#' + params.toString() : '');
  window.history.replaceState(null, '', newUrl);

  const fullUrl = window.location.href;
  alert('✅ Impostazioni salvate!\n\n📌 IMPORTANTE: aggiungi alla Home questo URL:\n\n' + fullUrl + '\n\nSe rimuovi e riaggiungi l\'app dalla Home, usa questo link.');
  navTo('oggi');
  renderOggi(true);
}

    document.getElementById('cfg-lat').value = pos.coords.latitude.toFixed(6);

// AUTO-UPDATE: controlla nuova versione da GitHub
// ─────────────────────────────────────────────
(async function checkUpdate() {
  try {
    // Aggiunge timestamp per bypassare cache
    const url = window.location.pathname + '?v=' + Date.now() + window.location.hash;
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) return;
    const html = await resp.text();
    // Cerca VERSION nel nuovo file
    const newVerMatch = html.match(/const APP_VERSION = '([^']+)'/);
    const curVerMatch = document.documentElement.outerHTML.match(/const APP_VERSION = '([^']+)'/);
    const newVer = newVerMatch ? newVerMatch[1] : null;
    const curVer = curVerMatch ? curVerMatch[1] : null;
    if (newVer && curVer && newVer !== curVer) {
      // Nuova versione disponibile — ricarica silenziosamente
      window.location.reload(true);
    }
  } catch(e) { /* offline — ignora */ }
})();
controllaCambioMese();

// INIT asincrono — carica da GitHub poi avvia
(async function init() {
  // Sync da GitHub (se configurato) — aggiorna localStorage con dati remoti
  const synced = await ghLoad();
  if (synced) controllaCambioMese();

  // Gestione azione da URL (es. ?action=arrivo o ?action=uscita)
  // Usato dalle iOS Shortcuts geofence per automazione
  (function handleUrlAction() {
    const params = new URLSearchParams(window.location.search);
    const action = params.get('action');
    if (!action) return;

    const cleanUrl = window.location.pathname + window.location.hash;
    window.history.replaceState(null, '', cleanUrl);

    if (action === 'arrivo') {
      const ora = new Date().toISOString();
      S.set('arrivo', ora);
      renderOggi(true).then(() => {
        const banner = document.createElement('div');
        banner.style.cssText = 'position:fixed;top:calc(env(safe-area-inset-top)+60px);left:50%;transform:translateX(-50%);background:#10B981;color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.3)';
        banner.textContent = '✅ Arrivo registrato: ' + new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'});
        document.body.appendChild(banner);
        setTimeout(() => banner.remove(), 3000);
      });
    } else if (action === 'uscita') {
      renderOggi(true).then(() => {
        const arrivoOggi = S.get('arrivo');
        if (!arrivoOggi || !isArrivoValido(arrivoOggi)) {
          S.set('arrivo', new Date().toISOString());
          alert('⚠️ Nessun arrivo registrato oggi.\nHo impostato l\'ora attuale come arrivo — modificala se necessario.');
          renderOggi(false);
        }
        setTimeout(() => apriModalUscita(), 500);
      });
    }
  })();

  renderOggi(true);
})();
