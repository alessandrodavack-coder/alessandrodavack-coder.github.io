<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>FLH Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #090909;
  --s1: #111111;
  --s2: #181818;
  --s3: #222222;
  --border: #2a2a2a;
  --acc: #F59E0B;
  --green: #10B981;
  --red: #EF4444;
  --yellow: #FBBF24;
  --t1: #F0F0F0;
  --t2: #888;
  --t3: #444;
  --mono: 'DM Mono', monospace;
  --sans: 'Sora', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* LAYOUT */
#app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
#topbar {
  padding: calc(var(--safe-top) + 12px) 20px 12px;
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  flex-shrink: 0;
}
#topbar .title { font-size: 13px; font-family: var(--mono); color: var(--t2); letter-spacing: 0.1em; text-transform: uppercase; }
#topbar .right { display: flex; gap: 8px; }
#content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 0 0 16px; }
#bottomnav {
  display: flex;
  border-top: 1px solid var(--border);
  background: var(--bg);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
}
.nav-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 10px 8px; background: none; border: none; cursor: pointer;
  color: var(--t3); font-family: var(--sans); font-size: 10px; font-weight: 600;
  letter-spacing: 0.05em; text-transform: uppercase; transition: color .15s;
}
.nav-btn.active { color: var(--acc); }
.nav-btn .ico { font-size: 20px; }
.icon-btn {
  background: var(--s2); border: 1px solid var(--border); border-radius: 8px;
  width: 34px; height: 34px; display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 16px; color: var(--t2);
}

/* SCREENS */
.screen { display: none; padding: 20px; }
.screen.active { display: block; }

/* CARDS */
.card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 14px;
  padding: 18px 20px; margin-bottom: 12px;
}
.card-label { font-size: 10px; font-family: var(--mono); color: var(--t3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px; }
.card-value { font-size: 28px; font-weight: 700; font-family: var(--mono); color: var(--t1); letter-spacing: -0.5px; }
.card-sub { font-size: 12px; color: var(--t2); margin-top: 4px; }

/* STATUS BADGE */
.status-badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
  font-family: var(--mono);
}
.status-badge.at-work { background: rgba(16,185,129,.15); color: var(--green); border: 1px solid rgba(16,185,129,.3); }
.status-badge.not-work { background: rgba(255,255,255,.04); color: var(--t3); border: 1px solid var(--border); }
.status-badge.unknown { background: rgba(255,255,255,.04); color: var(--t2); border: 1px solid var(--border); }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* SHIFT CARD */
.shift-card {
  background: linear-gradient(135deg, #141414 0%, #0f0f0f 100%);
  border: 1px solid var(--border); border-left: 3px solid var(--acc);
  border-radius: 14px; padding: 18px 20px; margin-bottom: 12px;
}
.shift-title { font-size: 13px; font-weight: 600; color: var(--acc); margin-bottom: 10px; font-family: var(--mono); }
.shift-times { display: flex; align-items: center; gap: 10px; }
.shift-time { font-size: 26px; font-weight: 700; font-family: var(--mono); }
.shift-arrow { color: var(--t3); font-size: 14px; }
.shift-delta { font-size: 11px; color: var(--t2); margin-top: 6px; font-family: var(--mono); }

/* ARRIVAL CARD */
.arrival-card {
  background: var(--s1); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px 20px; margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.arrival-info .label { font-size: 10px; font-family: var(--mono); color: var(--t3); text-transform: uppercase; letter-spacing: .1em; }
.arrival-info .time { font-size: 20px; font-family: var(--mono); font-weight: 500; color: var(--t1); margin-top: 2px; }

/* MAIN BUTTON */
.btn-main {
  width: 100%; padding: 16px; border-radius: 14px; border: none; cursor: pointer;
  font-family: var(--sans); font-size: 16px; font-weight: 700; letter-spacing: -0.2px;
  transition: all .15s; position: relative; overflow: hidden;
}
.btn-main:active { transform: scale(.97); }
.btn-main.arrival { background: var(--acc); color: #000; }
.btn-main.departure { background: var(--s2); color: var(--t1); border: 1px solid var(--border); }
.btn-main.disabled { background: var(--s2); color: var(--t3); border: 1px solid var(--border); pointer-events: none; }
.btn-secondary {
  width: 100%; padding: 13px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--s2); color: var(--t2); cursor: pointer; font-family: var(--sans);
  font-size: 14px; font-weight: 600; margin-top: 8px; transition: all .15s;
}
.btn-secondary:active { background: var(--s3); }
.btn-small {
  padding: 6px 12px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--s2); color: var(--t2); cursor: pointer; font-family: var(--mono);
  font-size: 11px; font-weight: 500;
}

/* PROGRESS RING */
.progress-wrap { display: flex; flex-direction: column; align-items: center; padding: 24px 20px 8px; }
.ring-container { position: relative; width: 180px; height: 180px; }
.ring-container svg { transform: rotate(-90deg); }
.ring-track { fill: none; stroke: var(--s3); stroke-width: 14; }
.ring-fill { fill: none; stroke: var(--acc); stroke-width: 14; stroke-linecap: round; transition: stroke-dashoffset .6s cubic-bezier(.4,0,.2,1); }
.ring-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; }
.ring-value { font-size: 28px; font-weight: 700; font-family: var(--mono); color: var(--t1); letter-spacing: -1px; }
.ring-label { font-size: 10px; color: var(--t3); font-family: var(--mono); text-transform: uppercase; margin-top: 2px; }
.ring-limit { font-size: 12px; color: var(--t2); margin-top: 12px; font-family: var(--mono); }

/* LOG LIST */
.log-list { margin-top: 4px; }
.log-item {
  background: var(--s1); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 16px; margin-bottom: 8px; display: grid;
  grid-template-columns: 1fr auto; gap: 4px 12px; align-items: center;
}
.log-date { font-size: 11px; font-family: var(--mono); color: var(--t3); }
.log-turno { font-size: 13px; font-weight: 600; color: var(--t1); }
.log-details { font-size: 11px; color: var(--t2); font-family: var(--mono); }
.log-flh { font-size: 18px; font-weight: 700; font-family: var(--mono); color: var(--acc); text-align: right; }
.log-flh.zero { color: var(--t3); font-size: 14px; }

/* ARCHIVIO */
.archive-item {
  background: var(--s1); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 20px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
}
.archive-mese { font-size: 14px; font-weight: 600; }
.archive-tot { font-size: 20px; font-family: var(--mono); font-weight: 700; color: var(--acc); }
.archive-giorni { font-size: 11px; color: var(--t3); font-family: var(--mono); margin-top: 2px; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
  z-index: 100; display: flex; align-items: flex-end;
  opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--s1); border: 1px solid var(--border); border-radius: 24px 24px 0 0;
  padding: 24px 20px calc(var(--safe-bottom) + 24px); width: 100%;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--s3); border-radius: 2px; margin: 0 auto 20px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }

/* MENSA TOGGLE */
.mensa-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
.mensa-btn {
  flex: 1; padding: 14px; border-radius: 12px; border: 2px solid var(--border);
  background: var(--s2); color: var(--t2); cursor: pointer; font-family: var(--sans);
  font-size: 15px; font-weight: 600; text-align: center; transition: all .15s;
}
.mensa-btn.selected { border-color: var(--acc); color: var(--acc); background: rgba(245,158,11,.08); }

/* FLH PREVIEW in modal */
.flh-preview {
  background: var(--s2); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px; margin-bottom: 20px;
}
.flh-preview-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); }
.flh-preview-row:last-child { border-bottom: none; padding-top: 10px; }
.flh-preview-label { font-size: 12px; color: var(--t2); font-family: var(--mono); }
.flh-preview-val { font-size: 13px; font-family: var(--mono); font-weight: 500; color: var(--t1); }
.flh-preview-total { font-size: 22px; font-family: var(--mono); font-weight: 700; color: var(--acc); }

/* SETUP */
.setup-group { margin-bottom: 20px; }
.setup-label { font-size: 11px; font-family: var(--mono); color: var(--t3); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
.setup-input {
  width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
  background: var(--s2); color: var(--t1); font-family: var(--mono); font-size: 14px;
  outline: none;
}
.setup-input:focus { border-color: var(--acc); }
.setup-hint { font-size: 11px; color: var(--t3); margin-top: 5px; line-height: 1.4; }

/* ALERT BANNER */
.alert-banner {
  background: rgba(245,158,11,.1); border: 1px solid rgba(245,158,11,.3);
  border-radius: 10px; padding: 12px 14px; margin-bottom: 12px;
  font-size: 12px; color: var(--acc2); line-height: 1.5;
}
.alert-banner.error { background: rgba(239,68,68,.1); border-color: rgba(239,68,68,.3); color: #FCA5A5; }
.alert-banner.success { background: rgba(16,185,129,.1); border-color: rgba(16,185,129,.3); color: #6EE7B7; }

/* DIVIDER */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.section-title { font-size: 11px; font-family: var(--mono); color: var(--t3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 10px; }

/* EMPTY STATE */
.empty { text-align: center; padding: 40px 20px; color: var(--t3); font-size: 13px; }
.empty .ico { font-size: 36px; margin-bottom: 12px; }

/* SPINNER */
.spinner {
  width: 20px; height: 20px; border: 2px solid var(--s3);
  border-top-color: var(--acc); border-radius: 50%;
  animation: spin .6s linear infinite; display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* EXPORT */
.export-btn {
  display: flex; align-items: center; gap: 10px; width: 100%;
  padding: 14px 16px; border-radius: 12px; border: 1px solid var(--border);
  background: var(--s2); color: var(--t1); cursor: pointer; font-family: var(--sans);
  font-size: 14px; font-weight: 600; margin-bottom: 10px; transition: background .15s;
}
.export-btn:active { background: var(--s3); }
.export-btn .ico { font-size: 20px; }

/* ANIMATIONS */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.screen.active { animation: fadeIn .2s ease; }
</style>

<div id="app">
  <!-- TOP BAR -->
  <div id="topbar">
    <div class="title" id="topbar-title">FLH TRACKER</div>
    <div class="right">
      <div class="icon-btn" id="refresh-btn" title="Aggiorna">🔄</div>
      <div class="icon-btn" id="settings-btn" title="Impostazioni">⚙️</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div id="content">

    <!-- SCREEN: OGGI -->
    <div class="screen active" id="screen-oggi">

        <!-- dynamic content -->
      </div>
    </div>

    <!-- SCREEN: MESE -->
    <div class="screen" id="screen-mese">
      <div id="mese-content"></div>
    </div>

    <!-- SCREEN: STORICO -->
    <div class="screen" id="screen-storico">
      <div id="storico-content"></div>
    </div>

    <!-- SCREEN: LOG -->
    <div class="screen" id="screen-log">
      <div id="log-content"></div>
    </div>

    <!-- SCREEN: SETUP -->
    <div class="screen" id="screen-setup">
      <div id="setup-content"></div>
    </div>

  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottomnav">
    <button class="nav-btn active" data-screen="oggi">
      <span class="ico">🕐</span>Oggi
    </button>
    <button class="nav-btn" data-screen="mese">
      <span class="ico">📊</span>Mese
    </button>
    <button class="nav-btn" data-screen="storico">
      <span class="ico">📁</span>Storico
    </button>

      <span class="ico">📋</span>Log
    </button>

<!-- MODAL: REGISTRA USCITA -->
<div class="modal-overlay" id="modal-uscita">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Registra Uscita</div>
    <div id="modal-uscita-content"></div>
  </div>
</div>

<!-- MODAL: MODIFICA GIORNO -->
<div class="modal-overlay" id="modal-modifica">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✏️ Modifica giorno</div>
    <div id="modal-modifica-content"></div>
  </div>
</div>

<!-- MODAL: RISULTATO FLH -->
<div class="modal-overlay" id="modal-risultato">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">✅ FLH Registrato</div>
    <div id="modal-risultato-content"></div>
  </div>
</div>

<script>

const S = {
  get: k => { try { return JSON.parse(localStorage.getItem('flh_' + k)); } catch { return null; } },
  set: (k, v) => localStorage.setItem('flh_' + k, JSON.stringify(v)),
  del: k => localStorage.removeItem('flh_' + k),
};

const GH = {
  FILE: 'dati_flh.json',

  headers(token) {
    return {
      'Authorization': 'token ' + token,
      'Accept': 'application/vnd.github+json',
      'Content-Type': 'application/json',
    };
  },

  async getFile(token, owner, repo, file) {
    try {
      const r = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/contents/${file || this.FILE}`,
        { headers: this.headers(token), cache: 'no-store' }
      );
      if (r.status === 404) return { content: null, sha: null };
      if (r.status === 401) throw new Error('Token non valido o scaduto (401 Unauthorized)');
      if (r.status === 403) throw new Error('Permessi insufficienti (403 Forbidden) — verifica che il token abbia scope "repo"');
      if (!r.ok) { const e = await r.json(); throw new Error(e.message + ' (' + r.status + ')'); }
      const d = await r.json();
      const content = JSON.parse(atob(d.content.replace(/\n/g, '')));
      return { content, sha: d.sha };
    } catch(e) { console.error('GH getFile error:', e); logAdd('sync_err', 'GitHub getFile: ' + e.message, ''); return null; }
  },

  async deleteFile(token, owner, repo, file, sha, message) {
    try {
      const r = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/contents/${file}`,
        {
          method: 'DELETE',
          headers: this.headers(token),
          body: JSON.stringify({ message: message || 'delete', sha }),
        }
      );
      return r.ok;
    } catch(e) { return false; }
  },

  async saveFile(token, owner, repo, data, sha, file) {
    try {
      const body = {
        message: 'FLH update ' + new Date().toISOString().slice(0,10),
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2)))),
      };
      if (sha) body.sha = sha;
      const r = await fetch(
        `https://api.github.com/repos/${owner}/${repo}/contents/${file || this.FILE}`,
        { method: 'PUT', headers: this.headers(token), body: JSON.stringify(body) }
      );
      if (r.status === 401) throw new Error('Token non valido o scaduto (401) — rigenera il token su github.com/settings/tokens');
      if (r.status === 403) throw new Error('Permessi insufficienti (403) — il token deve avere scope "repo"');
      if (r.status === 404) throw new Error('Repository non trovato (404) — controlla Username e Repository');
      if (r.status === 409) throw new Error('Conflitto (409) — riprova tra qualche secondo');
      if (!r.ok) { const e = await r.json(); throw new Error(e.message + ' (' + r.status + ')'); }
      const d = await r.json();
      return d.content.sha;
    } catch(e) { console.error('GH save error:', e); logAdd('sync_err', 'GitHub saveFile: ' + e.message, ''); return null; }
  },
};

// Carica dati da GitHub e aggiorna localStorage

// ── TRIGGER GITHUB ──────────────────────────────────────────
// Le Shortcut iOS scrivono trigger_arrivo.json o trigger_uscita.json
// tramite GitHub API (funziona col telefono bloccato).
// L'app legge il trigger all'apertura, lo processa e lo cancella.
async function processaTriggerGitHub() {
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) return;

  for (const tipo of ['arrivo', 'uscita']) {
    const filename = 'trigger_' + tipo + '.json';
    try {
      const result = await GH.getFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, filename);
      if (!result || !result.content) continue;

      const trigger = result.content;
      const triggerTs = new Date(trigger.ts);
      const ora = triggerTs.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'});

      // Cancella subito il trigger per evitare doppia esecuzione
      await GH.deleteFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, filename, result.sha,
        'FLH: trigger ' + tipo + ' processato');

      if (tipo === 'arrivo') {
        // Registra arrivo solo se non ce n'è già uno valido oggi
        const arrivoEsistente = S.get('arrivo');
        if (!arrivoEsistente || !isArrivoValido(arrivoEsistente)) {
          S.set('arrivo', triggerTs.toISOString());
          logAdd('arrivo', 'Arrivo da Shortcut (bloccato): ' + ora, '');
          logAdd('info', 'Trigger GitHub letto: arrivo ' + ora, '');
        }
      } else {
        // Registra uscita provvisoria
        const arrivoISO = S.get('arrivo');
        if (arrivoISO && isArrivoValido(arrivoISO)) {
          S.set('uscita_provvisoria', { ts: triggerTs.toISOString(), arrivoISO });
          logAdd('info', 'Trigger GitHub letto: uscita ' + ora, 'Provvisoria — verrà finalizzata a fine turno');
        }
      }
    } catch(e) {
      // Trigger non presente o errore — ignora
    }
  }
}

// ─── 3. SYNC ───────────────────────────────────────────────
async function ghLoad() {
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) return false;
  const result = await GH.getFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo);
  if (!result || !result.content) return false;
  const d = result.content;
  S.set('gh_sha', result.sha);
  // La config viene gestita tramite QR, link o PIN — non da GitHub
  if (d.mese_attivo) S.set('mese_attivo', d.mese_attivo);
  if (d.mese_corrente !== undefined) S.set('mese_corrente', d.mese_corrente);
  if (d.log_corrente) S.set('log_corrente', d.log_corrente);
  if (d.archivio) S.set('archivio', d.archivio);
  logAdd('sync_ok', 'Dati caricati da GitHub', d.aggiornato ? 'Aggiornato: ' + new Date(d.aggiornato).toLocaleString('it-IT') : '');
  return true;
}

// Merge log di due dispositivi: per stesso giorno/turno vince il salvataggio più recente
// Merge di due log: per stessa chiave (dateFmt|turnoInizio) vince
// la registrazione con timestamp più recente. Usato da ghSave.
function mergeLog(logA, logB) {
  const map = new Map();
  [...logA, ...logB].forEach(r => {
    const key = r.dateFmt + '|' + r.turnoInizio;
    const prev = map.get(key);
      if (!prev || new Date(r.data) > new Date(prev.data)) map.set(key, r);
  });
  return Array.from(map.values()).sort((a,b) => new Date(a.data) - new Date(b.data));
}

// Salva su GitHub con strategia read-before-write:
// rilegge sempre l'ultimo sha remoto e fa merge prima di scrivere.
// Garantisce coerenza anche con due dispositivi aperti contemporaneamente.
async function ghSave() {
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) return false;

  const remote = await GH.getFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo);
  let sha = remote ? remote.sha : S.get('gh_sha');

  if (remote && remote.content) {
    const rem = remote.content;
    const localLog = S.get('log_corrente') || [];
    const remoteLog = rem.log_corrente || [];

    const mergedLog = mergeLog(localLog, remoteLog);

    const localArch = S.get('archivio') || [];
    const remoteArch = rem.archivio || [];
    const archMap = new Map();
    [...remoteArch, ...localArch].forEach(a => archMap.set(a.mese, a));
    const mergedArch = Array.from(archMap.values())
      .sort((a,b) => b.mese.localeCompare(a.mese));

    const totMerged = mergedLog.reduce((s,r) => s + (r.isFMH ? 0 : (r.flhTot||0)), 0);

    const righeAggiunteDaRemote = mergedLog.length - localLog.length;
    if (righeAggiunteDaRemote > 0) {
      logAdd('merge', 'Merge dati da altro dispositivo', '+' + righeAggiunteDaRemote + ' righe integrate');
    }
    S.set('log_corrente', mergedLog);
    S.set('archivio', mergedArch);
    S.set('mese_corrente', totMerged);
  }

  // La config NON viene salvata su GitHub (contiene credenziali sensibili)
  // Rimane solo in localStorage, QR, link e PIN cifrato
  const data = {
    mese_attivo: S.get('mese_attivo'),
    mese_corrente: S.get('mese_corrente') || 0,
    log_corrente: S.get('log_corrente') || [],
    archivio: S.get('archivio') || [],
    aggiornato: new Date().toISOString(),
  };
  const newSha = await GH.saveFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, data, sha);
  if (newSha) {
    S.set('gh_sha', newSha);
    logAdd('sync_ok', 'Dati salvati su GitHub', 'Log: ' + (S.get('log_corrente')||[]).length + ' righe');
    return true;
  }
  // L'errore è già stato loggato in GH.saveFile
  return false;
}

  calendarId: '',
  workLat: 41.9248,

  ghToken: '',
  ghOwner: '',

function getConfig() {

function getMeseKey(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

// ─── 5. CAMBIO MESE ───────────────────────────────────────
function controllaCambioMese() {
  const meseAttivo = S.get('mese_attivo');
  const meseOggi = getMeseKey();
  if (meseAttivo && meseAttivo !== meseOggi) {
    const totMin = S.get('mese_corrente') || 0;
    const log = S.get('log_corrente') || [];
    const archivio = S.get('archivio') || [];
    const meseArchiviato = { mese: meseAttivo, totMin, totFmt: minToHM(totMin), giorni: log };
    archivio.unshift(meseArchiviato);
    S.set('archivio', archivio);
    S.set('mese_corrente', 0);
    S.set('log_corrente', []);
    S.del('arrivo');
    S.set('mese_attivo', meseOggi);
    logAdd('archivio', 'Mese ' + meseAttivo + ' archiviato', 'Totale: ' + minToHM(totMin) + ' | ' + log.length + ' giorni');
    archiviaMeseGitHub(meseAttivo, meseArchiviato).catch(()=>{});
    ghSave();
  } else {
    S.set('mese_attivo', meseOggi);
  }
}

function minToHM(min) {
  min = Math.max(0, Math.round(min));
  const h = Math.floor(min / 60);
  const m = min % 60;
  return h + 'h ' + String(m).padStart(2, '0') + 'm';
}

function fmtTime(d) {
  if (!d) return '--:--';
  d = new Date(d);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}

function fmtDate(d) {
  d = new Date(d);
  const giorni = ['Dom', 'Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab'];
  const mesi = ['Gen', 'Feb', 'Mar', 'Apr', 'Mag', 'Giu', 'Lug', 'Ago', 'Set', 'Ott', 'Nov', 'Dic'];
  return giorni[d.getDay()] + ' ' + d.getDate() + ' ' + mesi[d.getMonth()];
}

function nomeMese(key) {
  const [y, m] = key.split('-');
  const nomi = ['Gennaio', 'Febbraio', 'Marzo', 'Aprile', 'Maggio', 'Giugno',
                'Luglio', 'Agosto', 'Settembre', 'Ottobre', 'Novembre', 'Dicembre'];
  return nomi[parseInt(m) - 1] + ' ' + y;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const dl = (lat2 - lat1) * Math.PI / 180;
  const do_ = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dl/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(do_/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function isArrivoValido(isoStr) {
  if (!isoStr) return false;
  const d = new Date(isoStr);
  const now = new Date();
  // Accetta arrivi nelle ultime 30 ore (copre turni notturni)
  return (now - d) < 30 * 60 * 60 * 1000;
}

function isToday(isoStr) {
  if (!isoStr) return false;
  const d = new Date(isoStr);
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

// ─── 7. CALCOLO FLH ───────────────────────────────────────
// Calcola FLH/FMH giornaliero.
// Regole: testa = ritardo arrivo, coda = anticipo uscita.
// Straordinario (uscita dopo fine turno) compensa la testa.
// Soglia minima: 15 min. Cap massimo: 120 min (2h).
function calcolaFLH(arrivo, uscita, turnoInizio, turnoFine) {
  const a = new Date(arrivo), u = new Date(uscita);
  const ti = new Date(turnoInizio), tf = new Date(turnoFine);

  // FLH testa: arrivato DOPO l'inizio turno
  let testa = a > ti ? Math.round((a - ti) / 60000) : 0;
  // FLH coda: uscito PRIMA della fine turno
  let coda  = u < tf ? Math.round((tf - u) / 60000) : 0;
  // Straordinario: uscito DOPO la fine turno — compensa il FLH testa
  const straordinario = u > tf ? Math.round((u - tf) / 60000) : 0;

  // Straordinario scala il FLH testa (non può andare sotto zero)
  testa = Math.max(0, testa - straordinario);

  // Applica soglia 15 min DOPO la compensazione
  // es: testa 20 - straord 10 = netta 10 → sotto soglia → 0
  if (testa < 15) testa = 0;
  if (coda  < 15) coda  = 0;

  let tot = testa + coda;
  if (tot > 120) { // max 2h
    const r = 120 / (testa + coda || 1);
    testa = Math.round(testa * r);
    coda  = 120 - testa;
    tot   = 120;
  }

  return { testa, coda, straordinario, tot, fmt: minToHM(tot) };
}

// ─── 8. GEOLOC ────────────────────────────────────────────
let geoStatus = 'unknown'; // unknown | at_work | away
let lastPos = null;

function checkGeo() {
  return new Promise(resolve => {
    if (!navigator.geolocation) { geoStatus = 'unavailable'; resolve(geoStatus); return; }
    navigator.geolocation.getCurrentPosition(pos => {
      lastPos = pos;
      const cfg = getConfig();
      const dist = haversine(pos.coords.latitude, pos.coords.longitude, cfg.workLat, cfg.workLng);
      geoStatus = dist <= cfg.workRadius ? 'at_work' : 'away';
      resolve(geoStatus);
    }, () => {
      geoStatus = 'unknown';
      resolve(geoStatus);
    }, { timeout: 8000, maximumAge: 60000 });
  });
}

// ─── 9. CALENDARIO ────────────────────────────────────────
let todayShift = null;
let calendarError = null;

// Recupera il turno attivo da Google Calendar.
// Priorità: 1) turno di ieri ancora in corso, 2) turno notturno di ieri finito
// oggi ma non ancora registrato, 3) primo turno che inizia oggi.
// Gli eventi MNL/MRIP vengono marcati come flhDisabilitato (→ FMH).
async function fetchShift() {
  const cfg = getConfig();
  calendarError = null;
  if (!cfg.apiKey || !cfg.calendarId) { calendarError = 'setup'; return null; }
  try {
    const now = new Date();
    const pad = n => String(n).padStart(2,'0');
    const todayStr = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate());
    const yest = new Date(now); yest.setDate(yest.getDate()-1);
    const yesterdayStr = yest.getFullYear() + '-' + pad(yest.getMonth()+1) + '-' + pad(yest.getDate());

    const tMin = new Date(yest.getFullYear(), yest.getMonth(), yest.getDate(), 0, 0, 0).toISOString();
    const tMax = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59).toISOString();

    const calId = encodeURIComponent(cfg.calendarId);
    const url = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events?timeMin=${tMin}&timeMax=${tMax}&key=${cfg.apiKey}&singleEvents=true&orderBy=startTime`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.error) { calendarError = data.error.message; return null; }

    // Helper: estrae orari da titolo tipo "MRIP 11.30-20.05" o "MNL 8.30-17.05"
    function orariDaTitolo(summary, dataBase) {
      const m = summary.match(/(\d{1,2})[.:](\d{2})\s*[-–]\s*(\d{1,2})[.:](\d{2})/);
      if (!m) return null;
      const ini = new Date(dataBase); ini.setHours(parseInt(m[1]), parseInt(m[2]), 0, 0);
      const fin = new Date(dataBase); fin.setHours(parseInt(m[3]), parseInt(m[4]), 0, 0);
      if (fin <= ini) fin.setDate(fin.getDate() + 1); // notturno
      return { ini, fin };
    }

    const allEventsRaw = (data.items || []).filter(e => e.start);
    const allEvents = [];

    // Raccoglie le date in cui c'è un evento tutto-il-giorno MNL o MRIP
    // → servirà per marcare come FMH i turni con orario dello stesso giorno
    const giorniFMH = new Set();
    for (const e of allEventsRaw) {
      if (!e.start.date) continue; // solo eventi tutto-il-giorno
      const titolo = (e.summary || '').toUpperCase().trim();
      if (titolo.startsWith('MNL') || titolo.startsWith('MRIP') ||
          titolo === 'MNL' || titolo === 'MRIP') {
        giorniFMH.add(e.start.date); // es. "2026-03-21"
      }
    }

    for (const e of allEventsRaw) {
      const titolo = (e.summary || '').toUpperCase().trim();
      const soloRiposo = ['NL','RIPOSO','RO','HP','FS','RRI','RN','FERIE','PERMESSO','MALATTIA'];
      if (soloRiposo.includes(titolo)) continue;
      // Scarta eventi tutto-il-giorno puri (MNL/MRIP senza orari sono già in giorniFMH)
      if (!e.start.dateTime) {
        if ((titolo.startsWith('MNL') || titolo.startsWith('MRIP')) && e.start.date) {
          const dataBase = new Date(e.start.date + 'T00:00:00');
          const orari = orariDaTitolo(e.summary || '', dataBase);
          if (orari) {
            allEvents.push({
              ...e,
              start: { dateTime: orari.ini.toISOString() },
              end:   { dateTime: orari.fin.toISOString() },
              _fmh: true
            });
          }
        }
        continue;
      }
      // Evento con orario — controlla se quel giorno ha un marcatore FMH
      const dataEvento = e.start.dateTime.slice(0,10);
      const isFMHTitolo = titolo.startsWith('MNL') || titolo.startsWith('MRIP');
      const isFMHGiorno = giorniFMH.has(dataEvento);
      allEvents.push({ ...e, _fmh: isFMHTitolo || isFMHGiorno });
    }
    const logCorrente = S.get('log_corrente') || [];

    // Helper: questo turno è già nel log nelle ultime 48h?
    const giaLoggato = startDate => {
      const ini = pad(startDate.getHours()) + ':' + pad(startDate.getMinutes());
      return logCorrente.some(r => {
        if (r.turnoInizio !== ini) return false;
        return (now - new Date(r.data)) < 48 * 60 * 60 * 1000;
      });
    };

    // ── CASO 1: turno di ieri ancora IN CORSO adesso ──
    const inCorso = allEvents.find(e => {
      if (e.start.dateTime.slice(0,10) !== yesterdayStr) return false;
      const end = new Date(e.end.dateTime);
      return now <= end;
    });
    if (inCorso) {
      todayShift = { titolo: inCorso.summary || 'Turno', inizio: new Date(inCorso.start.dateTime), fine: new Date(inCorso.end.dateTime), flhDisabilitato: !!inCorso._fmh };
      return todayShift;
    }

    // ── CASO 2: turno notturno di ieri, finito OGGI dopo mezzanotte,
    //            uscita non ancora registrata ──
    const notturnoFinito = allEvents.find(e => {
      if (e.start.dateTime.slice(0,10) !== yesterdayStr) return false;
      const end = new Date(e.end.dateTime);
      const endStr = end.getFullYear() + '-' + pad(end.getMonth()+1) + '-' + pad(end.getDate());
      if (endStr !== todayStr) return false; // finisce ieri → non è notturno
      if (now <= end) return false;          // ancora in corso → già caso 1
      return !giaLoggato(new Date(e.start.dateTime));
    });
    if (notturnoFinito) {
      todayShift = { titolo: notturnoFinito.summary || 'Turno', inizio: new Date(notturnoFinito.start.dateTime), fine: new Date(notturnoFinito.end.dateTime), flhDisabilitato: !!notturnoFinito._fmh };
      return todayShift;
    }

    // ── CASO 3: turno che INIZIA oggi, non ancora loggato ──
    const turniOggi = allEvents.filter(e => {
      const start = new Date(e.start.dateTime);
      const localDate = start.getFullYear() + '-' + pad(start.getMonth()+1) + '-' + pad(start.getDate());
      return localDate === todayStr && !giaLoggato(start);
    });
    if (!turniOggi.length) { calendarError = 'Nessun turno oggi nel calendario "Turni"'; return null; }
    const ev = turniOggi[0];
    todayShift = { titolo: ev.summary || 'Turno', inizio: new Date(ev.start.dateTime), fine: new Date(ev.end.dateTime), flhDisabilitato: !!ev._fmh };
    return todayShift;

  } catch(e) {
    calendarError = 'Errore di rete — riprova';
    return null;
  }
}

// ─── 10. RENDER OGGI ───────────────────────────────────────
async function renderOggi(refresh) {
  const el = document.getElementById('oggi-content');
  if (refresh || !todayShift) {
    el.innerHTML = '<div style="display:flex;align-items:center;gap:10px;padding:20px 0;color:var(--t3)"><div class="spinner"></div> Caricamento...</div>';
    await Promise.all([checkGeo(), fetchShift()]);
  }

  controllaCambioMese();
  const arrivoSalvato = S.get('arrivo');
  const arrivoOggi = arrivoSalvato && isArrivoValido(arrivoSalvato) ? arrivoSalvato : null;

  // Controlla mancata uscita: arrivo salvato di più di 16 ore fa senza uscita registrata
  const logCorrente = S.get('log_corrente') || [];
  let mancataUscita = false;
  if (arrivoSalvato && !isArrivoValido(arrivoSalvato)) {
    // Arrivo vecchio (>30h) senza uscita corrispondente nel log
    const arrivoD = new Date(arrivoSalvato);
    const pad = n => String(n).padStart(2,'0');
    const arrivoData = arrivoD.getFullYear() + '-' + pad(arrivoD.getMonth()+1) + '-' + pad(arrivoD.getDate());
    const giaUscito = logCorrente.some(r => {
      const rD = new Date(r.data);
      const rData = rD.getFullYear() + '-' + pad(rD.getMonth()+1) + '-' + pad(rD.getDate());
      return rData === arrivoData;
    });
    if (!giaUscito) {
      mancataUscita = true;
      // Pulisce l'arrivo orfano
      S.del('arrivo');
    }
  }

  let html = '';

  // Status badge
  const badges = {
    at_work: '<span class="status-badge at-work"><span class="badge-dot"></span>Sei al lavoro</span>',
    away: '<span class="status-badge not-work"><span class="badge-dot"></span>Non sei al lavoro</span>',
    unknown: '<span class="status-badge unknown"><span class="badge-dot"></span>Posizione non rilevata</span>',
    unavailable: '<span class="status-badge not-work"><span class="badge-dot"></span>GPS non disponibile</span>',
  };
  html += `<div style="margin-bottom:14px">${badges[geoStatus] || badges.unknown}</div>`;
  html += `<div style="font-size:12px;color:var(--t3);font-family:var(--mono);margin-bottom:16px">${fmtDate(new Date())} · ${new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'})}</div>`;

  // Alert mancata uscita
  if (mancataUscita) {
    html += `<div class="alert-banner warn" style="border-left-color:var(--yellow);margin-bottom:12px">
      ⚠️ <strong>Mancata uscita rilevata</strong><br>
      Hai un arrivo registrato senza uscita corrispondente. Vuoi registrarla ora?
      <br><button class="btn-small" style="margin-top:8px" onclick="apriModalUscitaManuale()">Registra uscita mancante</button>
    </div>`;
  }

  // Setup warning
  const cfg = getConfig();
  if (!cfg.apiKey || !cfg.calendarId) {
    html += '<div class="alert-banner">⚙️ <strong>Configurazione richiesta</strong><br>Tocca ⚙️ in alto per inserire API Key e Calendar ID del tuo Google Calendar.</div>';
  }

  // Shift card
  if (todayShift) {
    const durata = Math.round((todayShift.fine - todayShift.inizio) / 60000);
    const durataH = Math.floor(durata / 60);
    const durataM = durata % 60;
    if (todayShift.flhDisabilitato) {
      const tipoTag = todayShift.titolo.toUpperCase().startsWith('MNL') ? 'MNL' : 'MRIP';
      html += `<div class="alert-banner" style="border-left-color:var(--yellow);background:rgba(251,191,36,.08);margin-bottom:8px">
        ⚠️ <strong>Turno ${tipoTag}</strong> — Presenza ridotta · <strong>FMH</strong> attivo · non conta nel mensile
      </div>`;
    }
    html += `<div class="shift-card" style="${todayShift.flhDisabilitato ? 'border-left-color:var(--yellow)' : ''}">
      <div class="shift-title" style="${todayShift.flhDisabilitato ? 'color:var(--yellow)' : ''}">${todayShift.titolo}</div>
      <div class="shift-times">
        <span class="shift-time">${fmtTime(todayShift.inizio)}</span>
        <span class="shift-arrow">→</span>
        <span class="shift-time">${fmtTime(todayShift.fine)}</span>
      </div>
      <div class="shift-delta">Durata prevista: ${durataH > 0 ? durataH + 'h ' : ''}${durataM}m</div>
    </div>`;
  } else if (calendarError && calendarError !== 'setup') {
    html += `<div class="alert-banner error">📅 ${calendarError}</div>`;
  } else if (!cfg.apiKey) {
    html += `<div class="card" style="border-style:dashed">
      <div class="card-label">Turno di oggi</div>
      <div style="color:var(--t3);font-size:13px;margin-top:4px">Configura il calendario per vedere i turni automaticamente</div>
    </div>`;
  }

  // Arrival
  if (arrivoOggi) {
    html += `<div class="arrival-card">
      <div class="arrival-info">
        <div class="label">Arrivo registrato</div>
        <div class="time">⏰ ${fmtTime(arrivoOggi)}</div>
      </div>
      <button class="btn-small" onclick="modificaArrivo()">Modifica</button>
    </div>`;
  }

  // Main action button
  if (!arrivoOggi) {
    html += `<button class="btn-main arrival" onclick="registraArrivo()">
      📍 Registra Arrivo
    </button>`;
  } else {
    html += `<button class="btn-main departure" onclick="apriModalUscita()">
      🚪 Registra Uscita e Calcola FLH
    </button>`;
  }

  // FLH già registrato oggi: cerca per turno corrente se disponibile, altrimenti per data
  const logOggi = todayShift
    ? (S.get('log_corrente') || []).find(r => r.turnoInizio === fmtTime(todayShift.inizio))
    : (S.get('log_corrente') || []).find(r => isToday(r.data));
  if (logOggi) {
    html += `<div class="divider"></div>
    <div class="alert-banner success">✅ FLH registrato: <strong>${logOggi.flhFmt}</strong> · Mese: <strong>${minToHM(S.get('mese_corrente') || 0)}</strong></div>`;
  }

  el.innerHTML = html;
}

// ─── 11. ARRIVO / USCITA ───────────────────────────────────
function registraArrivo() {
  const ora = new Date().toISOString();
  S.set('arrivo', ora);
  renderOggi(false);
}

function modificaArrivo() {
  const arrivoAttuale = S.get('arrivo');
  const oraStr = prompt('Ora di arrivo (formato HH:MM):', fmtTime(arrivoAttuale || new Date()));
  if (!oraStr) return;
  const [h, m] = oraStr.split(':').map(Number);
  if (isNaN(h) || isNaN(m)) { alert('Formato non valido'); return; }
 
  const base = arrivoAttuale ? new Date(arrivoAttuale) : new Date();
  base.setHours(h, m, 0, 0);
  S.set('arrivo', base.toISOString());
  renderOggi(false);
}

let mensaScelto = null;
function apriModalUscitaManuale() {
  const arrivoSalvato = S.get('arrivo');
  const arrivoStr = prompt('Che ora sei arrivato? (HH:MM)', arrivoSalvato ? fmtTime(arrivoSalvato) : '');
  if (!arrivoStr) return;
  const [ah, am] = arrivoStr.split(':').map(Number);
  if (isNaN(ah) || isNaN(am)) { alert('Formato non valido'); return; }

  const uscitaStr = prompt('Che ora sei uscito? (HH:MM)', '');
  if (!uscitaStr) return;
  const [uh, um] = uscitaStr.split(':').map(Number);
  if (isNaN(uh) || isNaN(um)) { alert('Formato non valido'); return; }

  // Base data: usa la data dell'arrivo salvato se esiste, altrimenti ieri
  const baseData = arrivoSalvato ? new Date(arrivoSalvato) : (() => { const d = new Date(); d.setDate(d.getDate()-1); return d; })();

  const arrivoD = new Date(baseData);
  arrivoD.setHours(ah, am, 0, 0);

  const uscitaD = new Date(baseData);
  uscitaD.setHours(uh, um, 0, 0);
  // Se uscita <= arrivo, è il giorno dopo (turno notturno)
  if (uscitaD <= arrivoD) uscitaD.setDate(uscitaD.getDate() + 1);

  S.set('arrivo', arrivoD.toISOString());
  apriModalUscita(uscitaD);
}

function apriModalUscita(uscitaOverride) {

function chiudiModal(id) {

function scegliMensa(v) {

function confermaUscita() {
  const arrivoISO = S.get('arrivo');
  const uscitaOra = new Date();

  let flhResult = { testa: 0, coda: 0, straordinario: 0, tot: 0, fmt: '0h 00m' };
  const isFMH = todayShift && todayShift.flhDisabilitato;
  if (todayShift && arrivoISO) {
    flhResult = calcolaFLH(arrivoISO, uscitaOra, todayShift.inizio, todayShift.fine);
  }

  // Salva nel log — usa la data di uscita come chiave giornaliera
  const riga = {
    data: uscitaOra.toISOString(),
    dateFmt: fmtDate(new Date(arrivoISO || uscitaOra)),
    turno: todayShift ? todayShift.titolo : '—',
    turnoInizio: todayShift ? fmtTime(todayShift.inizio) : '—',
    turnoFine: todayShift ? fmtTime(todayShift.fine) : '—',
    arrivo: fmtTime(arrivoISO),
    uscita: fmtTime(uscitaOra),
    mensa: mensaScelto,
    flhTesta: flhResult.testa,
    flhCoda: flhResult.coda,
    flhStraordinario: flhResult.straordinario || 0,
    flhTot: flhResult.tot,
    flhFmt: flhResult.fmt,
    isFMH: isFMH || false,
  };

  const log = S.get('log_corrente') || [];
  // Evita duplicati: rimuovi eventuale registrazione con stessa ora di inizio turno
  const filtered = log.filter(r => r.turnoInizio !== riga.turnoInizio);
  filtered.push(riga);
  S.set('log_corrente', filtered);

  const vecchioTot = S.get('mese_corrente') || 0;
  const vecchioConTurno = log.find(r => r.turnoInizio === riga.turnoInizio);
  const vecchioFlhTot = vecchioConTurno ? (vecchioConTurno.isFMH ? 0 : vecchioConTurno.flhTot) : 0;
  const base = vecchioTot - vecchioFlhTot;
  S.set('mese_corrente', Math.max(0, base + (isFMH ? 0 : flhResult.tot)));

  S.del('arrivo');
  logAdd('uscita', (isFMH?'FMH':'FLH') + ' registrato: ' + flhResult.fmt,
    riga.arrivo + ' → ' + riga.uscita + ' | ' + (riga.turno||''));

  chiudiModal('modal-uscita');
  mostraRisultato(riga);

  ghSave().then(ok => {
    if (!ok) logAdd('sync_err', 'Salvataggio GitHub fallito', 'Dati salvati solo in locale');
  });
}

  let html = '';

  if (riga.flhCoda > 0) html += `<div class="flh-preview-row"><span class="flh-preview-label">Anticipo uscita</span><span class="flh-preview-val" style="color:var(--acc)">${riga.flhCoda}'</span></div>`;
  if (riga.isFMH) {
    html += `<div class="flh-preview-row"><span class="flh-preview-label" style="color:var(--yellow)">⚠️ Turno MNL/MRIP</span><span style="font-size:11px;color:var(--t3)">FMH — non conta nel mensile</span></div>`;
    html += `<div class="flh-preview-row"><span class="flh-preview-label" style="color:var(--t1);font-weight:600">FMH oggi</span><span class="flh-preview-total" style="color:var(--yellow)">${riga.flhFmt}</span></div>`;
  } else {
    html += `<div class="flh-preview-row"><span class="flh-preview-label" style="color:var(--t1);font-weight:600">FLH oggi</span><span class="flh-preview-total">${riga.flhFmt}</span></div>`;

// ─── 12. RENDER MESE ───────────────────────────────────────
function renderMese() {
  const totMin = S.get('mese_corrente') || 0;
  const log = S.get('log_corrente') || [];
  const meseKey = getMeseKey();
  const pct = Math.min(1, totMin / 600);
  const R = 80, C = 90;
  const circ = 2 * Math.PI * R;
  const offset = circ * (1 - pct);

  let html = `<div class="progress-wrap">
    <div class="ring-container">
      <svg width="${C*2}" height="${C*2}" viewBox="0 0 ${C*2} ${C*2}">
        <circle class="ring-track" cx="${C}" cy="${C}" r="${R}" />
        <circle class="ring-fill" cx="${C}" cy="${C}" r="${R}"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" />
      </svg>
      <div class="ring-center">
        <div class="ring-value">${minToHM(totMin)}</div>
        <div class="ring-label">${nomeMese(meseKey)}</div>
      </div>
    </div>
    <div class="ring-limit">di 10h 00m disponibili · residuo <strong style="color:var(--green)">${minToHM(Math.max(0, 600 - totMin))}</strong></div>
  </div><div style="padding:0 20px">`;

  // Export
  html += `<button class="export-btn" onclick="esportaMese()">
    <span class="ico">📤</span>
    <div>
      <div>Esporta mese corrente (.txt)</div>
      <div style="font-size:10px;color:var(--t3);font-family:var(--mono);margin-top:2px">→ File · Personale · Desktop · FLH</div>
    </div>
  </button>`;

  html += '<div class="divider"></div>';
  html += `<div class="section-title">Giorni registrati (${log.length})</div>`;
  html += '<div class="log-list">';

  if (!log.length) {
    html += '<div class="empty"><div class="ico">📋</div>Nessun giorno registrato questo mese</div>';
  } else {
    [...log].reverse().forEach((r, i) => {
      const idx = log.length - 1 - i; // indice reale nel log non invertito
      html += `<div class="log-item">
        <div style="min-width:0">
          <div class="log-date">${r.dateFmt}</div>
          <div class="log-turno">${r.turno}</div>
          <div class="log-details">${r.turnoInizio}→${r.turnoFine} · presenza ${r.arrivo}→${r.uscita} · mensa ${r.mensa==='si'?'✓':'✗'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0">
          <div class="${r.isFMH ? 'log-flh' : r.flhTot > 0 ? 'log-flh' : 'log-flh zero'}" style="${r.isFMH ? 'color:var(--yellow)' : ''}">${r.isFMH ? 'FMH ' : ''}${r.flhFmt}</div>
          <button class="btn-small" onclick="apriModificaGiorno(${idx})">✏️</button>
        </div>
      </div>`;
    });
  }

  html += '</div></div>';
  document.getElementById('mese-content').innerHTML = html;
}

function esportaMese() {
  const log = S.get('log_corrente') || [];
  const totMin = S.get('mese_corrente') || 0;
  const meseKey = getMeseKey();
  let txt = `=== ${nomeMese(meseKey)} | Totale: ${totMin} min (${minToHM(totMin)}) | Residuo: ${minToHM(Math.max(0, 600 - totMin))} ===\n`;
  txt += 'DATA|TURNO|T_INI|T_FIN|ARRIVO|USCITA|MENSA|TESTA|CODA|TOT_MIN|FLH\n';
  log.forEach(r => {
    txt += `${r.dateFmt}|${r.turno}|${r.turnoInizio}|${r.turnoFine}|${r.arrivo}|${r.uscita}|${r.mensa}|${r.flhTesta}|${r.flhCoda}|${r.flhTot}|${r.flhFmt}\n`;
  });
  const blob = new Blob([txt], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `FLH_${meseKey}.txt`;
  a.click(); URL.revokeObjectURL(url);
  setTimeout(() => alert('📂 File scaricato!\n\nSalvalo in:\nFile → Personale → Desktop → FLH\n(OneDrive personale)'), 400);
}

// ─── 13. ACTIVITY LOG ─────────────────────────────────────
const LOG_MAX = 200; // righe massime in memoria

function logAdd(tipo, messaggio, dettaglio) {
  const voci = S.get('activity_log') || [];
  voci.unshift({
    ts: new Date().toISOString(),
    tipo, // 'sync_ok' | 'sync_err' | 'arrivo' | 'uscita' | 'modifica' | 'archivio' | 'info' | 'merge'
    msg: messaggio,
    det: dettaglio || '',
  });
  if (voci.length > LOG_MAX) voci.length = LOG_MAX;
  S.set('activity_log', voci);
}

function renderLog() {
  const el = document.getElementById('log-content');
  const voci = S.get('activity_log') || [];
  const icone = {
    sync_ok: '☁️', sync_err: '❌', arrivo: '🟢', uscita: '🔴',
    modifica: '✏️', archivio: '📦', info: 'ℹ️', merge: '🔀',
  };
  let html = `<div style="padding:20px 20px 0">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div class="section-title" style="margin:0">📋 Log operazioni</div>
      <button class="btn-small" onclick="cancellaLog()">🗑️ Svuota</button>
    </div>`;
  if (!voci.length) {
    html += `<div class="empty"><div class="ico">📋</div>Nessuna operazione registrata</div>`;
  } else {
    voci.forEach(v => {
      const ico = icone[v.tipo] || 'ℹ️';
      const d = new Date(v.ts);
      const data = d.toLocaleDateString('it-IT',{day:'2-digit',month:'2-digit'});
      const ora  = d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const colore = v.tipo === 'sync_err' ? '#FCA5A5' :
                     v.tipo === 'sync_ok'  ? '#6EE7B7' :
                     v.tipo === 'merge'    ? '#93C5FD' : '#F0F0F0';
      html += `<div style="padding:10px 0;border-bottom:1px solid #1a1a1a">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
          <div style="display:flex;gap:8px;align-items:flex-start;min-width:0">
            <span style="font-size:16px;flex-shrink:0">${ico}</span>
            <div style="min-width:0">
              <div style="font-size:13px;color:${colore};font-weight:500">${v.msg}</div>
              ${v.det ? `<div style="font-size:11px;color:#555;margin-top:2px;font-family:monospace;word-break:break-all">${v.det}</div>` : ''}
            </div>
          </div>
          <div style="font-size:10px;color:#444;font-family:monospace;flex-shrink:0;text-align:right">
            ${data}<br>${ora}
          </div>
        </div>
      </div>`;
    });
  }
  html += '</div>';
  el.innerHTML = html;
}

function cancellaLog() {
  if (confirm('Svuotare il log operazioni?')) {
    S.del('activity_log');
    renderLog();
  }
}

// ─── 14. ARCHIVIO PER ANNO ─────────────────────────────────
async function archiviaMeseGitHub(mese, datiMese) {
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) return;
  const anno = mese.slice(0, 4); // es. "2026"
  const filename = `archivio_${anno}.json`;

  // Leggi archivio anno corrente da GitHub
  const result = await GH.getFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, filename);
  let archAnno = result && result.content ? result.content : {};
  const sha = result ? result.sha : null;

  // Aggiungi o aggiorna il mese
  archAnno[mese] = datiMese;

  const newSha = await GH.saveFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, archAnno, sha, filename);
  if (newSha) {
    logAdd('archivio', `Mese ${mese} archiviato su GitHub`, filename);
  } else {
    logAdd('sync_err', `Errore archivio ${mese}`, filename);
  }
}

async function caricaArchivioAnno(anno) {
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) return null;
  const result = await GH.getFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, `archivio_${anno}.json`);
  return result && result.content ? result.content : null;
}

}

function salvaModificaGiorno() {
  const log = S.get('log_corrente') || [];
  const r = log[editIdx];
  if (!r) return;

  const nuovoArrivo = document.getElementById('edit-arrivo').value;
  const nuovaUscita = document.getElementById('edit-uscita').value;
  const nuovaMensa = document.getElementById('edit-mensa-si').classList.contains('selected') ? 'si' : 'no';

  if (!nuovoArrivo || !nuovaUscita) { alert('Inserisci orari validi'); return; }

  // Ricostruisce le date usando la data originale del giorno
  const baseData = new Date(r.data);
  const [ah, am] = nuovoArrivo.split(':').map(Number);
  const [uh, um] = nuovaUscita.split(':').map(Number);

  const arrivoD = new Date(baseData); arrivoD.setHours(ah, am, 0, 0);
  const uscitaD = new Date(baseData); uscitaD.setHours(uh, um, 0, 0);
  if (uscitaD <= arrivoD) uscitaD.setDate(uscitaD.getDate() + 1);

  // Ricalcola FLH
  const [tiH, tiM] = r.turnoInizio.split(':').map(Number);
  const [tfH, tfM] = r.turnoFine.split(':').map(Number);
  const turnoIni = new Date(baseData); turnoIni.setHours(tiH, tiM, 0, 0);
  const turnoFin = new Date(baseData); turnoFin.setHours(tfH, tfM, 0, 0);
  if (turnoFin <= turnoIni) turnoFin.setDate(turnoFin.getDate() + 1);

  const flh = calcolaFLH(arrivoD, uscitaD, turnoIni, turnoFin);

  // Aggiorna la riga
  const vecchioFlh = r.flhTot;
  log[editIdx] = {
    ...r,
    arrivo: fmtTime(arrivoD),
    uscita: fmtTime(uscitaD),
    mensa: nuovaMensa,
    flhTesta: flh.testa,
    flhCoda: flh.coda,
    flhStraordinario: flh.straordinario || 0,
    flhTot: flh.tot,
    flhFmt: flh.fmt,
  };
  S.set('log_corrente', log);

  const tot = (S.get('mese_corrente') || 0) - vecchioFlh + flh.tot;
  S.set('mese_corrente', Math.max(0, tot));

  logAdd('modifica', 'Giorno modificato: ' + r.dateFmt, r.arrivo + ' → ' + r.uscita + ' → ' + flh.fmt);
  chiudiModal('modal-modifica');
  ghSave();
  renderMese();
  alert(`✅ Giorno modificato\nFLH: ${flh.fmt}`);
}

function eliminaGiorno(idx) {
  if (!confirm('Eliminare questo giorno dal log?')) return;
  const log = S.get('log_corrente') || [];
  const riga = log[idx];
  const vecchioFlh = riga ? riga.flhTot : 0;
  const dateFmtEliminato = riga ? riga.dateFmt : '';
  log.splice(idx, 1);
  S.set('log_corrente', log);
  const tot = Math.max(0, (S.get('mese_corrente') || 0) - vecchioFlh);
  S.set('mese_corrente', tot);
  logAdd('modifica', 'Giorno eliminato: ' + dateFmtEliminato, '');
  chiudiModal('modal-modifica');
  ghSave();
  renderMese();
}

  const urlArrivo = origin + path + '?action=arrivo';

    logAdd('info', 'Impostazioni salvate', ok ? 'Sincronizzato su GitHub' : 'GitHub sync fallita');

async function testaGitHub() {
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) {
    alert('⚠️ Compila prima Token, Username e Repository, poi tocca Salva impostazioni.');
    return;
  }
  alert('🔄 Test in corso...\n\nToken: ' + cfg.ghToken.slice(0,8) + '...\nOwner: ' + cfg.ghOwner + '\nRepo: ' + cfg.ghRepo);

  try {
    // Step 1: verifica token
    const r1 = await fetch('https://api.github.com/user', {
      headers: { 'Authorization': 'token ' + cfg.ghToken, 'Accept': 'application/vnd.github+json' }
    });
    const d1 = await r1.json();
    if (!r1.ok) { alert('❌ Token non valido\nHTTP ' + r1.status + ': ' + d1.message); return; }
    alert('✅ Token OK — account: ' + d1.login + '\n\nOra verifico il repository...');

    // Step 2: verifica repository
    const r2 = await fetch('https://api.github.com/repos/' + cfg.ghOwner + '/' + cfg.ghRepo, {
      headers: { 'Authorization': 'token ' + cfg.ghToken, 'Accept': 'application/vnd.github+json' }
    });
    const d2 = await r2.json();
    if (!r2.ok) { alert('❌ Repository non trovato\nHTTP ' + r2.status + ': ' + d2.message + '\n\nVerifica:\n• Username: ' + cfg.ghOwner + '\n• Repository: ' + cfg.ghRepo); return; }
    alert('✅ Repository OK — ' + d2.full_name + ' (' + (d2.private ? 'privato' : 'pubblico') + ')\n\nOra provo a scrivere un file di test...');

    // Step 3: prova scrittura
    const testContent = btoa(JSON.stringify({ test: true, ts: new Date().toISOString() }));
    const r3 = await fetch('https://api.github.com/repos/' + cfg.ghOwner + '/' + cfg.ghRepo + '/contents/test_connessione.json', {
      method: 'PUT',
      headers: { 'Authorization': 'token ' + cfg.ghToken, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'test connessione FLH', content: testContent })
    });
    const d3 = await r3.json();
    if (!r3.ok) { alert('❌ Scrittura fallita\nHTTP ' + r3.status + ': ' + d3.message + '\n\nIl token ha scope "repo"?'); return; }

    // Elimina il file di test
    const sha = d3.content.sha;
    await fetch('https://api.github.com/repos/' + cfg.ghOwner + '/' + cfg.ghRepo + '/contents/test_connessione.json', {
      method: 'DELETE',
      headers: { 'Authorization': 'token ' + cfg.ghToken, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'elimina test FLH', sha })
    });

    alert('🎉 Tutto funziona!\n\nToken ✅\nRepository ✅\nScrittura ✅\n\nOra torna in ⚙️ e tocca "Salva impostazioni" — la sync andrà a buon fine.');
  } catch(e) {
    alert('❌ Errore di rete: ' + e.message + '\n\nVerifica la connessione internet e riprova.');
  }
}

// ─── 18. BACKUP ────────────────────────────────────────────
// ── SALVA TUTTO IL BACKUP (ZIP) ─────────────────────────────
// Genera un file ZIP con 3 file nella cartella FLH_Backup:
//   1. qr_backup.png    — QR code con le credenziali
//   2. link_ripristino.txt — URL di ripristino
//   3. istruzioni.txt   — guida PIN e info generali
async function salvaBackupCompleto() {
  const cfg = getConfig();
  if (!cfg.apiKey && !cfg.ghToken) {
    alert('⚠️ Nessuna impostazione da salvare.\nConfigura prima API Key e GitHub Token in ⚙️.');
    return;
  }

  const status = document.getElementById('backup-status');
  status.style.display = 'block';
  status.textContent = '⏳ Generazione in corso...';

  try {
    const zip = new JSZip();
    const cartella = zip.folder('FLH_Backup');
    const data = new Date().toLocaleDateString('it-IT');

    // ── File 1: link_ripristino.txt ──────────────────────────
    const payload = btoa(unescape(encodeURIComponent(JSON.stringify({
      k: cfg.apiKey, c: cfg.calendarId, r: cfg.workRadius,
      lat: cfg.workLat, lng: cfg.workLng,
      gt: cfg.ghToken, go: cfg.ghOwner, gr: cfg.ghRepo,
    }))));
    const linkRipristino = window.location.origin + window.location.pathname + '?restore=' + payload;
    cartella.file('link_ripristino.txt',
      'FLH Tracker — Link di ripristino\n' +
      'Generato il: ' + data + '\n\n' +
      'COME USARE:\n' +
      'Apri questo link in Safari su qualsiasi dispositivo.\n' +
      'Le impostazioni verranno ripristinate automaticamente.\n\n' +
      'LINK:\n' + linkRipristino + '\n'
    );

    // ── File 2: QR code come PNG ─────────────────────────────
    status.textContent = '⏳ Generazione QR...';
    let qrPng = null;
    try {
      qrPng = await new Promise((resolve, reject) => {
        const div = document.createElement('div');
        div.style.cssText = 'position:absolute;left:-9999px;top:-9999px';
        document.body.appendChild(div);
        new QRCode(div, {
          text: JSON.stringify({
            k: cfg.apiKey, c: cfg.calendarId, r: cfg.workRadius,
            lat: cfg.workLat, lng: cfg.workLng,
            gt: cfg.ghToken, go: cfg.ghOwner, gr: cfg.ghRepo,
          }),
          width: 300, height: 300,
          colorDark: '#000000', colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M,
        });
        setTimeout(() => {
          try {
            const canvas = div.querySelector('canvas');
            if (!canvas) { document.body.removeChild(div); resolve(null); return; }
            canvas.toBlob(blob => {
              document.body.removeChild(div);
              resolve(blob);
            }, 'image/png');
          } catch(e) {
            try { document.body.removeChild(div); } catch(_) {}
            resolve(null); // QR fallito ma non bloccante
          }
        }, 600);
      });
    } catch(e) {
      console.warn('QR generation failed:', e);
      qrPng = null;
    }

    if (qrPng) {
      cartella.file('qr_backup.png', qrPng);
    } else {
      // QR non disponibile — aggiungi un file di testo al posto
      cartella.file('qr_backup_NOTA.txt',
        'Il QR code non è stato generato su questo browser.\n' +
        'Per generarlo, usa l\'app su iPhone:\n' +
        '⚙️ → Backup & Ripristino → Genera QR → Screenshot\n'
      );
    }

    // ── File 3: istruzioni.txt ───────────────────────────────
    const pinInput = document.getElementById('pin-input');
    const pinSalvato = pinInput && pinInput.value ? '✅ PIN salvato su GitHub' : '⚠️ PIN non ancora impostato — vai in ⚙️ → Backup → PIN';
    cartella.file('istruzioni.txt',
      '╔══════════════════════════════════════╗\n' +
      '║    FLH TRACKER — Guida Ripristino   ║\n' +
      '╚══════════════════════════════════════╝\n\n' +
      'Generato il: ' + data + '\n' +
      'Utente: ' + (cfg.ghOwner || 'non configurato') + '\n\n' +
      '── METODO 1: QR CODE (più veloce) ────────────\n' +
      'File: qr_backup.png\n' +
      'Come usare:\n' +
      '1. Apri il file qr_backup.png\n' +
      '2. Nell\'app → ⚙️ → Backup → Scansiona QR\n' +
      '3. Seleziona l\'immagine → impostazioni ripristinate\n\n' +
      '── METODO 2: LINK (universale) ───────────────\n' +
      'File: link_ripristino.txt\n' +
      'Come usare:\n' +
      '1. Apri link_ripristino.txt\n' +
      '2. Copia il link\n' +
      '3. Incollalo in Safari → impostazioni ripristinate\n\n' +
      '── METODO 3: PIN (più sicuro) ────────────────\n' +
      'Stato: ' + pinSalvato + '\n' +
      'Come usare:\n' +
      '1. Apri l\'app → ⚙️ → Backup → PIN\n' +

      'NOTA: richiede GitHub Token già configurato\n\n' +
      '── URL APP ───────────────────────────────────\n' +
      window.location.origin + window.location.pathname + '\n'
    );

    // ── Genera ZIP e apre il foglio di condivisione iOS ─────
    status.textContent = '⏳ Compressione ZIP...';
    const blob = await zip.generateAsync({ type: 'blob', compression: 'DEFLATE' });
    const nomeFile = 'FLH_Backup_' + data.replace(/\//g, '-') + '.zip';

    // Web Share API — apre il foglio di condivisione nativo iOS
    // (Files, iCloud Drive, OneDrive, AirDrop, Note, ecc.)
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [new File([blob], nomeFile)] })) {
      const file = new File([blob], nomeFile, { type: 'application/zip' });
      await navigator.share({
        title: 'FLH Backup',
        text: 'Backup impostazioni FLH Tracker',
        files: [file],
      });
    } else {
      // Fallback per browser desktop — download diretto
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = nomeFile;
      a.click();
      URL.revokeObjectURL(url);
    }

    status.style.color = '#6EE7B7';
    status.textContent = '✅ ZIP scaricato! Salvalo in File → iCloud Drive o OneDrive';
    logAdd('info', 'Backup completo ZIP scaricato', '3 file: QR, link, istruzioni');

    setTimeout(() => {
      status.style.display = 'none';
      status.style.color = '';
    }, 5000);

  } catch(e) {
    status.style.color = '#FCA5A5';
    status.textContent = '❌ Errore: ' + e.message;
    console.error('Backup error:', e);
  }
}

async function derivaChiave(pin, salt) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(String(pin)), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMat, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

async function salvaConPIN() {
  const pin = document.getElementById('pin-input').value.trim();
  if (!pin || pin.length < 4) { alert('⚠️ Inserisci un PIN di almeno 4 cifre.'); return; }
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) {
    alert('⚠️ GitHub non configurato.\n\n' +
      '• Token: ' + (cfg.ghToken ? '✅' : '❌ mancante') + '\n' +
      '• Username: ' + (cfg.ghOwner || '❌ mancante') + '\n' +
      '• Repository: ' + (cfg.ghRepo || '❌ mancante') + '\n\n' +
      'Vai in ⚙️ → compila i campi GitHub → tocca ✅ Salva impostazioni → riprova.'
    );
    return;
  }
  try {
    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv   = crypto.getRandomValues(new Uint8Array(12));
    const key  = await derivaChiave(pin, salt);
    const payload = new TextEncoder().encode(JSON.stringify({
      k: cfg.apiKey, c: cfg.calendarId, r: cfg.workRadius,
      lat: cfg.workLat, lng: cfg.workLng,
      gt: cfg.ghToken, go: cfg.ghOwner, gr: cfg.ghRepo,
    }));
    const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, payload);
    const blob = { salt: Array.from(salt), iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) };
    const sha = S.get('pin_sha');
    const newSha = await GH.saveFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, blob, sha, 'config_pin.json');
    if (newSha) {
      S.set('pin_sha', newSha);
      alert('✅ PIN salvato su GitHub!\nRicorda il PIN: ' + pin);
    } else {
      alert('❌ Errore nel salvataggio su GitHub.');
    }
  } catch(e) {
    alert('❌ Errore: ' + e.message);
  }
}


async function ripristinaConPIN() {
  const pin = prompt('Inserisci il PIN di ripristino:');
  if (!pin) return;
  const cfg = getConfig();
  if (!cfg.ghToken || !cfg.ghOwner || !cfg.ghRepo) {
    alert('⚠️ Per usare il PIN serve almeno il GitHub Token, Username e Repository già configurati.\nUsa il QR o il Link per il ripristino completo.');
    return;
  }
  try {
    const result = await GH.getFile(cfg.ghToken, cfg.ghOwner, cfg.ghRepo, 'config_pin.json');
    if (!result || !result.content) { alert('❌ Nessun backup PIN trovato su GitHub.'); return; }
    const blob = result.content;
    const salt = new Uint8Array(blob.salt);
    const iv   = new Uint8Array(blob.iv);
    const data = new Uint8Array(blob.data);
    const key  = await derivaChiave(pin, salt);
    const dec  = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
    const d    = JSON.parse(new TextDecoder().decode(dec));
    const restored = {
      apiKey: d.k || '', calendarId: d.c || '',
      workRadius: d.r || 150, workLat: d.lat || 41.9248, workLng: d.lng || 12.4598,
      ghToken: d.gt || '', ghOwner: d.go || '', ghRepo: d.gr || '',
    };
    S.set('config', restored);
    alert('✅ Impostazioni ripristinate con PIN!\nRiconnessione a GitHub in corso...');
    ghLoad().then(ok => {
      if (ok) { controllaCambioMese(); alert('✅ Dati ripristinati da GitHub!'); }
      navTo('oggi');
      renderOggi(true);
    });

    alert('❌ PIN errato o dati corrotti.');
  }

function leggiQRdaFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const cv = document.createElement('canvas');
      cv.width = img.width;
      cv.height = img.height;
      const ctx = cv.getContext('2d');
      ctx.drawImage(img, 0, 0);
      const imgData = ctx.getImageData(0, 0, cv.width, cv.height);
      const code = jsQR(imgData.data, imgData.width, imgData.height);
      if (!code) { alert('❌ QR non riconosciuto. Riprova con uno screenshot più nitido.'); return; }
      try {
        const d = JSON.parse(code.data);
        const cfg = {
          apiKey:     d.k  || '',
          calendarId: d.c  || '',
          workRadius: d.r  || 150,
          workLat:    d.lat || 41.9248,
          workLng:    d.lng || 12.4598,
          ghToken:    d.gt || '',
          ghOwner:    d.go || '',
          ghRepo:     d.gr || '',
        };
        S.set('config', cfg);
        alert('✅ Impostazioni ripristinate dal QR!\n\nRiconnessione a GitHub in corso...');
        // Ricarica dati da GitHub
        ghLoad().then(ok => {
          if (ok) {
            controllaCambioMese();
            alert('✅ Dati ripristinati da GitHub!');
          }
          navTo('oggi');
          renderOggi(true);
        });
      } catch(err) {
        alert('❌ QR non valido o danneggiato.');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  // Reset input per permettere di riscansionare lo stesso file
  event.target.value = '';
}

// Finalizza un'uscita provvisoria calcolando il FLH
// Chiamata quando il turno è finito e non c'è stato rientro
async function finalizzaUscitaProvvisoria(uscitaProvv) {
  await fetchShift();
  const arrivoISO = uscitaProvv.arrivoISO;
  const uscitaOra = new Date(uscitaProvv.ts);
  const arrivoFmt = new Date(arrivoISO).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  const uscitaFmt = uscitaOra.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  let flh = { testa:0, coda:0, straordinario:0, tot:0, fmt:'0h 00m' };
  if (todayShift && arrivoISO) flh = calcolaFLH(arrivoISO, uscitaOra, todayShift.inizio, todayShift.fine);
  const isFMH = !!(todayShift && todayShift.flhDisabilitato);
  const riga = {
    data: uscitaOra.toISOString(), dateFmt: fmtDate(uscitaOra),
    turno: todayShift ? todayShift.titolo : '—',
    turnoInizio: todayShift ? fmtTime(todayShift.inizio) : '—',
    turnoFine:   todayShift ? fmtTime(todayShift.fine)   : '—',
    arrivo: arrivoFmt, uscita: uscitaFmt, mensa: 'si',
    flhTesta: flh.testa, flhCoda: flh.coda, flhStraordinario: flh.straordinario||0,
    flhTot: flh.tot, flhFmt: flh.fmt, isFMH,
  };
  const log = S.get('log_corrente') || [];
  const filtered = log.filter(r => !isToday(r.data));
  filtered.push(riga);
  S.set('log_corrente', filtered);
  const vecchioOggi   = log.find(r => isToday(r.data));
  const vecchioFlhTot = vecchioOggi ? (vecchioOggi.isFMH ? 0 : vecchioOggi.flhTot) : 0;
  S.set('mese_corrente', Math.max(0, (S.get('mese_corrente')||0) - vecchioFlhTot + (isFMH ? 0 : flh.tot)));
  S.del('uscita_provvisoria');
  S.del('arrivo');
  logAdd('uscita', (isFMH?'FMH':'FLH') + ' finalizzato: ' + flh.fmt, arrivoFmt + ' → ' + uscitaFmt);
  ghSave();
  return { flh, isFMH, arrivoFmt, uscitaFmt };
}

// INIT asincrono — carica da GitHub poi avvia
(async function init() {
  // Controlla se c'è un link di ripristino nell'URL
  if (checkRestoreLink()) return;

  // Sync da GitHub (se configurato) — aggiorna localStorage con dati remoti
  const synced = await ghLoad();
  if (synced) controllaCambioMese();

  // Legge trigger scritti dalle Shortcut iOS via GitHub API
  // (funziona anche col telefono bloccato — nessuna app si apre)
  await processaTriggerGitHub();

  // Verifica uscita provvisoria pendente — logica basata sul turno:
  // se il turno è finito e non sei rientrato → FLH reale, altrimenti aspetta
  const uscitaProvv = S.get('uscita_provvisoria');
  if (uscitaProvv) {
    await fetchShift(); // carica il turno per sapere quando finisce
    const now = new Date();
    const turnoFine = todayShift ? todayShift.fine : null;
    const turnoFinito = turnoFine && now > turnoFine;
    if (turnoFinito) {
      // Il turno è finito → finalizza FLH con l'orario dell'uscita reale
      await finalizzaUscitaProvvisoria(uscitaProvv);
    }
    // Turno ancora in corso → non fare nulla, potrebbe rientrare
  }

  // Gestione azione da URL (es. ?action=arrivo o ?action=uscita)
  // Usato dalle iOS Shortcuts geofence per automazione
  await (async function handleUrlAction() {
    // URL fissi: ?action=arrivo o ?action=uscita — nessun hash
    const qsParams = new URLSearchParams(window.location.search);
    const action = qsParams.get('action');
    if (!action) return;
    // Pulisce la querystring senza ricaricare
    window.history.replaceState(null, '', window.location.pathname);

    if (action === 'arrivo') {
      const now = new Date();
      const arrivoEsistente = S.get('arrivo');
      const uscitaProvv    = S.get('uscita_provvisoria');

      if (uscitaProvv) {
        // C'è un'uscita provvisoria — logica basata sul turno
        await fetchShift();
        const turnoFine   = todayShift ? todayShift.fine : null;
        const turnoFinito = turnoFine && now > turnoFine;

        if (turnoFinito) {
          // Turno finito → eri uscito definitivamente, finalizza FLH poi registra rientro
          const res = await finalizzaUscitaProvvisoria(uscitaProvv);
          // Poi registra nuovo arrivo come inizio del turno successivo
          S.set('arrivo', now.toISOString());
          const oraFmt = now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
          logAdd('arrivo', 'Nuovo arrivo (post turno): ' + oraFmt, '');
          ghSave();

          const uscitaFmt = new Date(uscitaProvv.ts).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
          const rientraFmt = now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});

            <div style="font-size:20px;font-weight:700;color:#F0F0F0">Uscita provvisoria</div>
            <div style="font-size:36px;font-weight:700;color:${colore};font-family:monospace">${flh.fmt}</div>
            <div style="font-size:13px;color:#888;font-family:monospace">${arrivoFmt} → ${oraFmt}</div>
            <div style="background:rgba(255,255,255,.05);border-radius:10px;padding:12px 16px;margin-top:8px;max-width:300px;text-align:center">
              <div style="font-size:12px;color:#666;line-height:1.5">
                Il ${tipo} verrà calcolato definitivamente<br>
                <strong style="color:#888">solo se il turno finisce senza che tu rientri</strong><br>
                <span style="font-size:11px;color:#444">Fine turno: ${todayShift ? fmtTime(todayShift.fine) : '—'}</span>
              </div>
            </div>
            <div style="font-size:13px;color:#555;margin-top:8px">Puoi chiudere Safari</div>
          </div>`;
      })();
    }

  })();

  renderOggi(true);
})();
</script>
</body>
</html>
